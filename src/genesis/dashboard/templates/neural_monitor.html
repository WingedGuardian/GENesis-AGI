function aggregateStatus(statuses) {
    const active = statuses.filter(s => s !== 'idle' && s !== 'disabled' && s !== 'unknown');
    if (active.length === 0) {
        if (statuses.includes('disabled')) return 'idle';
        if (statuses.includes('idle')) return 'idle';
        return 'unknown';
    }
    if (active.includes('down')) return 'down';
    if (active.includes('degraded') || active.includes('warning')) return 'degraded';
    if (active.some(s => s === 'healthy' || s === 'active')) return 'healthy';
    return 'unknown';
}

function statusDotColor(status) {
    const c = { healthy: '#4ade80', active: '#4ade80', warning: '#f59e0b', degraded: '#ffe600', down: '#ef4444', idle: '#888' };
    return c[status] || '#888';
}

const SUBSYSTEM_BORDER_COLORS = {
    ego: '#c084fc', reflection: '#818cf8', memory: '#38bdf8', surplus: '#4ade80',
    outreach: '#fbbf24', executor: '#a78bfa', learning: '#fb923c',
    contingency: '#f87171', utility: '#94a3b8',
};


function updateSubsystemGrid(data) {
    const container = document.getElementById('monitor-grid');
    if (!container) return;
    container.style.display = 'flex';

    const bgGrid = document.getElementById('battleship-grid');
    const enrichGrid = document.getElementById('enrichment-cards');
    if (!bgGrid || !enrichGrid) return;

    // Preserve surplus detail state before clearing
    const oldSurplus = document.getElementById('enrich-surplus');
    const surplusWasOpen = oldSurplus && oldSurplus.querySelector('.surplus-detail-content.open');

    bgGrid.replaceChildren();
    enrichGrid.replaceChildren();

    const callSites = data.call_sites || {};

    for (const [key, group] of Object.entries(SUBSYSTEM_GROUPS)) {
        // ── Top: flat grid cells for this subsystem (column-fill square) ──
        for (const siteId of group.sites) {
            const siteData = callSites[siteId] || {};
            const meta = getMeta(siteId);
            const status = siteData.status || 'unknown';
            const cell = el('div', 'bg-cell bg-' + key);
            const dot = el('div', 'grid-dot ' + gridDotClass(status));
            dot.addEventListener('click', () => showDetail({ id: siteId, status, data: siteData }));
            const tipRows = [{ cls: 'dot-tip-name', text: meta.name }];
            if (status === 'idle') tipRows.push({ text: 'Groundwork' });
            else if (status === 'disabled') tipRows.push({ text: 'No API key' });
            else tipRows.push({ text: status });
            if (siteData.active_provider) tipRows.push({ text: siteData.active_provider });
            if (siteData.recent_failures) {
                const failAge = siteData.last_failure_at
                    ? formatAge(Math.round((Date.now() - new Date(siteData.last_failure_at).getTime()) / 1000)) + ' ago'
                    : 'recently';
                tipRows.push({ text: siteData.recent_failures + ' failure(s) in 30min, latest ' + failAge, style: 'color:#f59e0b' });
            }
            const descText = siteData.description || meta.desc;
            if (descText) tipRows.push({ text: descText, style: 'color:#94a3b8;margin-top:3px' });
            if (siteData.chain_health) {
                const apiChain = siteData.chain_health.filter(c => !c.is_cc);
                const ccChain = siteData.chain_health.filter(c => c.is_cc);
                const apiUp = apiChain.filter(c => {
                    const ps = c.probe_status;
                    return ps ? ps === 'reachable' : c.state !== 'open';
                }).length;
                let chainSummary = apiUp + '/' + apiChain.length + ' API';
                if (ccChain.length > 0) {
                    const ccPs = ccChain[0].probe_status;
                    const ccOk = ccPs ? ccPs !== 'unreachable' : ccChain[0].state !== 'open';
                    chainSummary += ', CC ' + (ccOk ? 'up' : 'down');
                }
                tipRows.push({ text: chainSummary });
            }
            dot.dataset.tip = JSON.stringify(tipRows);
            dot.addEventListener('mouseenter', () => showTip(dot));
            dot.addEventListener('mouseleave', hideTip);
            cell.appendChild(dot);
            cell.appendChild(el('div', 'bg-cell-label', meta.name));
            bgGrid.appendChild(cell);
        }

        // ── Bottom: enrichment card ──────────────────────────────────────
        const bColor = SUBSYSTEM_BORDER_COLORS[key] || '#475569';
        const card = el('div', 'enrich-card');
        card.id = 'enrich-' + key;
        card.style.borderLeftColor = bColor;

        // Card header: agg dot + name + count
        const memberStatuses = group.sites.map(id => (callSites[id] || {}).status || 'unknown');
        const aggStatus = aggregateStatus(memberStatuses);
        const activeCount = memberStatuses.filter(s => s === 'healthy' || s === 'active').length;

        const header = el('div', 'region-header');
        const aggDot = el('span', 'agg-dot');
        aggDot.style.background = statusDotColor(aggStatus);
        header.appendChild(aggDot);
        header.appendChild(el('h3', null, group.name));
        header.appendChild(el('span', 'region-count', activeCount + '/' + group.sites.length));
        card.appendChild(header);

        if (group.desc) card.appendChild(el('div', 'region-desc', group.desc));

        const enrichment = el('div', 'region-enrichment');
        let hasEnrichment = false;

        if (key === 'ego') {
            enrichment.appendChild(sectionRow('Status', 'Groundwork', 'color:#c084fc;font-style:italic'));
            hasEnrichment = true;
        }
        if (key === 'reflection') {
            const aw = data.awareness || {};
            if (aw.ticks_24h !== undefined) { enrichment.appendChild(sectionRow('Ticks/24h', String(aw.ticks_24h))); hasEnrichment = true; }
            if (aw.time_since_last_tick_seconds != null) {
                enrichment.appendChild(sectionRow('Last Tick', formatAge(aw.time_since_last_tick_seconds) + ' ago'));
                hasEnrichment = true;
            }
            if (aw.depth_distribution_24h) {
                const dist = Object.entries(aw.depth_distribution_24h).map(([k,v]) => k + ':' + v).join(', ');
                if (dist) { enrichment.appendChild(sectionRow('Depths', dist)); hasEnrichment = true; }
            }
        }
        if (key === 'memory') {
            const q = data.queues || {};
            const mh = data.memory_health || {};
            const pm = data.proactive_memory || {};

            const links = mh.links || {};
            if (q.embedded_total || links.total) {
                const parts = [];
                if (q.embedded_total) parts.push(q.embedded_total + ' vectors');
                if (links.total) parts.push(links.total.toLocaleString() + ' links');
                enrichment.appendChild(sectionRow('Store', parts.join(' \u00B7 ')));
                hasEnrichment = true;
            }

            const ek = mh.essential_knowledge || {};
            if (ek.age_hours !== null && ek.age_hours !== undefined) {
                const age = ek.age_hours;
                const c = age > 24 ? 'color:#ef4444' : age > 6 ? 'color:#ffe600' : 'color:#4ade80';
                const size = ek.size_bytes ? ' \u00B7 ' + (ek.size_bytes / 1024).toFixed(1) + 'KB' : '';
                enrichment.appendChild(sectionRow('L1 EK', age.toFixed(1) + 'h ago' + size, c));
                hasEnrichment = true;
            }

            if (pm.latency_ms !== undefined) {
                const lat = pm.latency_ms;
                const fts = pm.fts5_results || 0;
                const vec = pm.vector_results || 0;
                const fused = pm.fused_results || 0;
                enrichment.appendChild(sectionRow('L2 Hook', lat + 'ms \u00B7 FTS:' + fts + ' Vec:' + vec + ' \u2192 ' + fused));
                hasEnrichment = true;
            }

            const wings = mh.wings || [];
            if (wings.length > 0) {
                const wStr = wings.slice(0, 5).map(w => w[0] + ':' + w[1]).join(' ');
                enrichment.appendChild(sectionRow('Wings', wStr));
                hasEnrichment = true;
            }

            const classes = mh.classes || [];
            if (classes.length > 0) {
                const cStr = classes.map(c => c[0] + ':' + c[1]).join(' ');
                enrichment.appendChild(sectionRow('Classes', cStr));
                hasEnrichment = true;
            }

            const conf = mh.confidence || {};
            if (conf.high !== undefined) {
                enrichment.appendChild(sectionRow('Confidence', 'hi:' + conf.high + ' med:' + conf.medium + ' lo:' + conf.low));
                hasEnrichment = true;
            }

            if (links.by_type && links.by_type.length > 0) {
                const lStr = links.by_type.slice(0, 4).map(l => l[0] + ':' + l[1]).join(' ');
                enrichment.appendChild(sectionRow('Link Types', lStr));
                hasEnrichment = true;
            }

            const ext = mh.extraction || {};
            if (ext.total_sessions !== undefined) {
                const c = ext.coverage_pct >= 90 ? 'color:#4ade80' : ext.coverage_pct >= 50 ? 'color:#ffe600' : 'color:#ef4444';
                enrichment.appendChild(sectionRow('Extraction', ext.extracted + '/' + ext.total_sessions + ' \u00B7 ' + ext.coverage_pct + '%', c));
                hasEnrichment = true;
            }

            const ci = mh.code_index || {};
            if (ci.modules) {
                const age = ci.age_hours;
                const c = age > 24 ? 'color:#ffe600' : 'color:#4ade80';
                enrichment.appendChild(sectionRow('Code Index', ci.modules + ' mod \u00B7 ' + (ci.symbols || 0).toLocaleString() + ' sym \u00B7 ' + (age ? age + 'h' : '?'), c));
                hasEnrichment = true;
            }

            if (q.pending_embeddings) { enrichment.appendChild(sectionRow('Pending', String(q.pending_embeddings), 'color:#ffe600')); hasEnrichment = true; }
            if (q.failed_embeddings) { enrichment.appendChild(sectionRow('Failed', String(q.failed_embeddings), 'color:#ef4444')); hasEnrichment = true; }

            if (mh.growth) {
                const g = mh.growth;
                if (g.last_7d !== undefined) { enrichment.appendChild(sectionRow('+7d', String(g.last_7d))); hasEnrichment = true; }
                if (g.avg_per_day_7d !== undefined) { enrichment.appendChild(sectionRow('Avg/day', String(g.avg_per_day_7d))); hasEnrichment = true; }
            }

            if (mh.orphans && mh.orphans.orphan_pct !== undefined) {
                const pct = mh.orphans.orphan_pct;
                const c = pct > 50 ? 'color:#ef4444' : pct > 30 ? 'color:#ffe600' : 'color:#4ade80';
                enrichment.appendChild(sectionRow('Orphans', pct.toFixed(1) + '%', c));
                hasEnrichment = true;
            }
        }
        if (key === 'surplus') {
            const s = data.surplus || {};
            if (s.status && s.status !== 'unknown') {
                const c = s.status === 'idle' ? '#4ade80' : s.status === 'dispatching' ? '#ffe600' : '#888';
                enrichment.appendChild(sectionRow('Scheduler', s.status, 'color:' + c));
                hasEnrichment = true;
            }
            if (s.queue_depth !== undefined) { enrichment.appendChild(sectionRow('Queue', String(s.queue_depth))); hasEnrichment = true; }
            if (s.tasks_completed_24h !== undefined) { enrichment.appendChild(sectionRow('Done/24h', String(s.tasks_completed_24h))); hasEnrichment = true; }
            if (s.tasks_failed_24h) { enrichment.appendChild(sectionRow('Failed/24h', String(s.tasks_failed_24h), 'color:#ef4444')); hasEnrichment = true; }

            const toggle = el('div', 'surplus-detail-toggle');
            toggle.appendChild(el('span', null, 'Details'));
            const arrow = el('span', 'arrow', '\u25B6');
            toggle.appendChild(arrow);
            enrichment.appendChild(toggle);
            hasEnrichment = true;

            const detailContent = el('div', 'surplus-detail-content');
            enrichment.appendChild(detailContent);

            toggle.addEventListener('click', function() {
                const isOpen = detailContent.classList.toggle('open');
                arrow.classList.toggle('open', isOpen);
                if (isOpen && !detailContent.dataset.loaded) {
                    detailContent.dataset.loaded = '1';
                    loadSurplusDetail(detailContent);
                }
            });

            if (surplusWasOpen) {
                detailContent.classList.add('open');
                arrow.classList.add('open');
                detailContent.dataset.loaded = '1';
                loadSurplusDetail(detailContent);
            }
        }
        if (key === 'outreach') {
            const o = data.outreach_stats || {};
            if (o.total !== undefined) { enrichment.appendChild(sectionRow('Sent (7d)', String(o.total))); hasEnrichment = true; }
            if (o.delivery_rate != null) { enrichment.appendChild(sectionRow('Delivery', Math.round(o.delivery_rate * 100) + '%')); hasEnrichment = true; }
            if (o.open_rate != null) { enrichment.appendChild(sectionRow('Open Rate', Math.round(o.open_rate * 100) + '%')); hasEnrichment = true; }
        }
        if (key === 'contingency') {
            const cc = data.cc_sessions || {};
            if (cc.realtime_status) {
                const c = cc.realtime_status === 'NORMAL' ? '#4ade80' : '#ffe600';
                enrichment.appendChild(sectionRow('CC Status', cc.realtime_status, 'color:' + c));
                hasEnrichment = true;
            }
        }

        // Per-call-site enrichment: last run, providers, cost, routing, status
        const siteRuns = [];
        for (const siteId of group.sites) {
            const sd = callSites[siteId] || {};
            if (sd.last_run_at) {
                const age = Math.round((Date.now() - new Date(sd.last_run_at).getTime()) / 1000);
                siteRuns.push({ id: siteId, age, provider: sd.active_provider || sd.last_run_provider });
            }
        }
        if (siteRuns.length > 0) {
            siteRuns.sort((a, b) => a.age - b.age);
            const latest = siteRuns[0];
            const meta = getMeta(latest.id);
            enrichment.appendChild(sectionRow('Last Run', meta.name + ' ' + formatAge(latest.age) + ' ago'));
            hasEnrichment = true;
            const providers = [...new Set(siteRuns.map(r => r.provider).filter(Boolean))];
            if (providers.length > 0) {
                enrichment.appendChild(sectionRow('Providers', providers.slice(0, 3).join(', ')));
                hasEnrichment = true;
            }
        }

        const costBySite = (data.cost || {}).cost_by_call_site || [];
        const siteSet = new Set(group.sites);
        let groupCalls = 0, groupCost = 0;
        for (const entry of costBySite) {
            if (siteSet.has(entry.call_site)) {
                groupCalls += entry.calls || 0;
                groupCost += entry.month_usd || 0;
            }
        }
        if (groupCalls > 0) {
            enrichment.appendChild(sectionRow('Calls', String(groupCalls) + ' \u00B7 $' + groupCost.toFixed(3)));
            hasEnrichment = true;
        }

        let totalProviders = 0, reachableProviders = 0;
        for (const siteId of group.sites) {
            const sd = callSites[siteId] || {};
            const ch = sd.chain_health || [];
            for (const c of ch) {
                if (c.is_cc) continue;
                totalProviders++;
                const ok = c.probe_status ? c.probe_status === 'reachable' : c.state !== 'open';
                if (ok) reachableProviders++;
            }
        }
        if (totalProviders > 0) {
            const rColor = reachableProviders === totalProviders ? 'color:#4ade80' :
                           reachableProviders > 0 ? 'color:#ffe600' : 'color:#ef4444';
            enrichment.appendChild(sectionRow('Routing', reachableProviders + '/' + totalProviders + ' providers ready', rColor));
            hasEnrichment = true;
        }

        const statusCounts = {};
        for (const siteId of group.sites) {
            const st = (callSites[siteId] || {}).status || 'unknown';
            statusCounts[st] = (statusCounts[st] || 0) + 1;
        }
        const healthyCount = (statusCounts.healthy || 0) + (statusCounts.active || 0);
        const idleCount = (statusCounts.idle || 0) + (statusCounts.disabled || 0);
        if (healthyCount < group.sites.length && idleCount > 0) {
            enrichment.appendChild(sectionRow('Sites', healthyCount + ' active, ' + idleCount + ' idle', 'color:#94a3b8'));
            hasEnrichment = true;
        }

        if (hasEnrichment) card.appendChild(enrichment);
        enrichGrid.appendChild(card);
    }
    // Pad last column to 7 rows
    const totalSites = Object.values(SUBSYSTEM_GROUPS).reduce((n, g) => n + g.sites.length, 0);
    const gridTotal = Math.ceil(totalSites / 7) * 7;
    for (let i = totalSites; i < gridTotal; i++) {
        bgGrid.appendChild(el('div', 'bg-cell-empty'));
    }
}

// ── Polling ─────────────────────────────────────────────────────────

function tickUpdateTimer() {
    const elapsed = Math.round((Date.now() - lastFetchTime) / 1000);
    document.getElementById('last-update').textContent = elapsed + 's ago';
}

function updateHeaderBadges(data) {
    // Resilience badge
    const hbRes = document.getElementById('hb-resilience');
    if (hbRes) {
        const resObj = data.resilience || {};
        const res = (typeof resObj === 'object' ? resObj.level : resObj) || 'unknown';
        const isOk = res === 'L0' || res === 'normal' || res === 'not configured';
        hbRes.style.display = 'inline-flex';
        hbRes.style.background = isOk ? 'rgba(22,101,52,0.5)' : 'rgba(133,77,14,0.5)';
        hbRes.querySelector('.hb-dot').style.background = isOk ? '#4ade80' : '#facc15';
        hbRes.querySelector('.hb-text').textContent = res;
        hbRes.querySelector('.hb-text').style.color = isOk ? '#4ade80' : '#facc15';
    }
    // CC status badge
    const hbCc = document.getElementById('hb-cc');
    if (hbCc && data.cc_sessions) {
        const ccSt = data.cc_sessions.realtime_status || 'unknown';
        const ccOk = ccSt === 'NORMAL';
        hbCc.style.display = 'inline-flex';
        hbCc.style.background = ccOk ? 'rgba(22,101,52,0.5)' : 'rgba(133,77,14,0.5)';
        hbCc.querySelector('.hb-dot').style.background = ccOk ? '#4ade80' : '#facc15';
        hbCc.querySelector('.hb-text').textContent = 'CC ' + ccSt;
        hbCc.querySelector('.hb-text').style.color = ccOk ? '#4ade80' : '#facc15';
    }
    // Call sites health summary
    const hbSites = document.getElementById('hb-sites');
    if (hbSites && data.call_sites) {
        const sites = Object.values(data.call_sites);
        const healthy = sites.filter(s => s.status === 'healthy' || s.status === 'active').length;
        const total = sites.length;
        const allOk = healthy === total;
        hbSites.style.display = 'inline-flex';
        hbSites.style.background = allOk ? 'rgba(22,101,52,0.4)' : 'rgba(30,41,59,0.6)';
        hbSites.querySelector('.hb-text').textContent = healthy + '/' + total + ' sites';
        hbSites.querySelector('.hb-text').style.color = allOk ? '#4ade80' : 'var(--color-text-secondary)';
    }
}

async function fetchHealth() {
    try {
        const resp = await fetch('/api/genesis/health');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        lastData = await resp.json();
        lastFetchTime = Date.now();

        document.getElementById('loading').style.display = 'none';
        updateSidePanel(lastData);
        updateSubsystemGrid(lastData);
        updateHeaderBadges(lastData);
    } catch (e) {
        console.error('Health fetch failed:', e);
        document.getElementById('loading').textContent = 'Connection error \u2014 retrying...';
        document.getElementById('loading').style.display = 'block';
    }
}

// ── Pause / Kill Switch ──────────────────────────────
let pauseState = { paused: false, reason: null, since: null };

async function fetchPauseState() {
    try {
        const resp = await fetch('/api/genesis/pause');
        if (resp.ok) {
            pauseState = await resp.json();
            renderPauseFooter();
        }
    } catch (e) { console.warn('Pause state fetch failed:', e); }
}

function renderPauseFooter() {
    const dot = document.getElementById('pause-dot');
    const label = document.getElementById('pause-label');
    const since = document.getElementById('pause-since');
    const btn = document.getElementById('pause-btn');
    if (!dot || !label || !btn) return;
    if (pauseState.paused) {
        dot.style.background = '#ffa726';
        label.textContent = 'PAUSED';
        label.style.color = '#ffa726';
        since.textContent = pauseState.since ? 'since ' + new Date(pauseState.since).toLocaleTimeString() : '';
        btn.textContent = 'Resume Genesis';
        btn.style.color = '#66bb6a';
        btn.style.borderColor = 'rgba(102,187,106,0.3)';
        btn.style.background = 'rgba(102,187,106,0.12)';
    } else {
        dot.style.background = '#66bb6a';
        label.textContent = 'RUNNING';
        label.style.color = '#66bb6a';
        since.textContent = '';
        btn.textContent = 'Pause Genesis';
        btn.style.color = '#ffa726';
        btn.style.borderColor = 'rgba(255,167,38,0.3)';
        btn.style.background = 'rgba(255,167,38,0.12)';
    }
}

async function togglePause() {
    const newState = !pauseState.paused;
    const pauseMsg = "Pause Genesis?\n\nThis will stop ALL background activity:\n\u2022 Reflections\n\u2022 Surplus tasks\n\u2022 Outreach\n\u2022 Inbox monitoring\n\nConversations still work but without background enrichment.\nYou must manually resume via this button or /pause off in Telegram.";
    const resumeMsg = "Resume Genesis?\n\nAll background activity will restart\n(reflections, surplus tasks, outreach, inbox monitoring).";
    if (!confirm(newState ? pauseMsg : resumeMsg)) return;
    try {
        const resp = await fetch('/api/genesis/pause', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paused: newState, reason: 'Dashboard toggle' }),
        });
        if (resp.ok) {
            await fetchPauseState();
        } else {
            const err = await resp.json().catch(() => ({}));
            alert('Pause toggle failed: ' + (err.message || 'HTTP ' + resp.status));
        }
    } catch (e) {
        alert('Pause toggle failed: ' + e.message);
    }
}

fetchHealth();
fetchPauseState();
setInterval(fetchHealth, 15000);
setInterval(fetchPauseState, 15000);
setInterval(tickUpdateTimer, 1000);

  <div style="display:flex;align-items:center;gap:0.75rem;">
    <span id="pause-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#66bb6a;"></span>
    <span id="pause-label" style="color:#66bb6a;font-weight:600;">RUNNING</span>
    <span id="pause-since" style="color:#888;"></span>
  </div>
  <button id="pause-btn" onclick="togglePause()"
    style="font-size:0.74rem;padding:0.35rem 0.9rem;border-radius:4px;cursor:pointer;
           font-weight:500;color:#ffa726;border:1px solid rgba(255,167,38,0.3);
           background:rgba(255,167,38,0.12);">Pause Genesis</button>
</div>
<div style="height:50px;"></div>

</body>
