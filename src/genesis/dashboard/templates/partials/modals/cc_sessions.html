

  <!-- CC Sessions Detail Modal -->
  <div class="config-modal-overlay" x-show="$store.genesisDashboard.ccSessionsModal.open"
       @click.self="$store.genesisDashboard.ccSessionsModal.open = false" x-transition>
    <div class="config-modal" style="max-width: 950px;">
      <div class="config-modal-header">
        <span>CC Sessions Detail</span>
        <span class="panel-status">
          <span class="status-dot" :style="`background:${$store.genesisDashboard.modalStateColor($store.genesisDashboard.ccSessionsModal)}`"></span>
          <span x-text="$store.genesisDashboard.modalStateLabel($store.genesisDashboard.ccSessionsModal)"></span>
        </span>
        <button @click="$store.genesisDashboard.ccSessionsModal.open = false">&times;</button>
      </div>
      <div class="config-modal-body">
        <template x-if="$store.genesisDashboard.modalStatusDetail($store.genesisDashboard.ccSessionsModal)">
          <div class="panel-status-detail" style="margin-bottom: 0.75rem;"
               x-text="$store.genesisDashboard.modalStatusDetail($store.genesisDashboard.ccSessionsModal)"></div>
        </template>
        <div x-show="$store.genesisDashboard.ccSessionsModal.fetch.state === 'loading' && !$store.genesisDashboard.ccSessionsModal.data"
             style="text-align: center; padding: 2rem; color: var(--color-text-secondary);">Loading...</div>
        <div x-show="$store.genesisDashboard.ccSessionsModal.fetch.state === 'error' && !$store.genesisDashboard.ccSessionsModal.data"
             class="empty-state">CC session detail unavailable.</div>
        <template x-if="$store.genesisDashboard.ccSessionsModal.data">
          <div>
            <!-- Summary stats (clickable filters) -->
            <div style="display: flex; gap: 0.5rem; margin-bottom: 0.6rem; flex-wrap: wrap;">
              <div style="font-size: 0.82rem; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; transition: opacity 0.15s;"
                   :style="`background: rgba(76,175,80,${$store.genesisDashboard.ccSessionsModal.filter === 'active' ? '0.3' : '0.12'}); color: #4caf50; opacity: ${!$store.genesisDashboard.ccSessionsModal.filter || $store.genesisDashboard.ccSessionsModal.filter === 'active' ? '1' : '0.5'}`"
                   title="Sessions marked active in the DB"
                   @click="$store.genesisDashboard.ccSessionsModal.filter = $store.genesisDashboard.ccSessionsModal.filter === 'active' ? null : 'active'">
                <span x-text="($store.genesisDashboard.ccSessionsModal.data.stats?.db_active || 0)"></span> db-active
              </div>
              <div style="font-size: 0.82rem; padding: 0.4rem 0.8rem; border-radius: 6px;"
                   :style="`background: rgba(59,130,246,0.12); color: #3b82f6;`"
                   title="Live claude processes carrying GENESIS_SLOT (from /proc) — informational, not a filter">
                <span x-text="($store.genesisDashboard.ccSessionsModal.data.stats?.live_procs || 0)"></span> live procs
              </div>
              <div style="font-size: 0.82rem; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; transition: opacity 0.15s;"
                   :style="`background: rgba(217,83,79,${$store.genesisDashboard.ccSessionsModal.filter === 'discrepant' ? '0.3' : '0.12'}); color: #d9534f; opacity: ${!$store.genesisDashboard.ccSessionsModal.filter || $store.genesisDashboard.ccSessionsModal.filter === 'discrepant' ? '1' : '0.5'}`"
                   title="Rows where DB state and live processes disagree"
                   @click="$store.genesisDashboard.ccSessionsModal.filter = $store.genesisDashboard.ccSessionsModal.filter === 'discrepant' ? null : 'discrepant'">
                <span x-text="($store.genesisDashboard.ccSessionsModal.data.stats?.discrepant || 0)"></span> discrepant
              </div>
              <div style="font-size: 0.82rem; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; transition: opacity 0.15s;"
                   :style="`background: rgba(100,116,139,${$store.genesisDashboard.ccSessionsModal.filter === 'completed' ? '0.3' : '0.12'}); color: #94a3b8; opacity: ${!$store.genesisDashboard.ccSessionsModal.filter || $store.genesisDashboard.ccSessionsModal.filter === 'completed' ? '1' : '0.5'}`"
                   @click="$store.genesisDashboard.ccSessionsModal.filter = $store.genesisDashboard.ccSessionsModal.filter === 'completed' ? null : 'completed'">
                <span x-text="($store.genesisDashboard.ccSessionsModal.data.stats?.completed_24h || 0)"></span> completed (24h)
              </div>
            </div>

            <!-- Budget explainer (health store, no fetch) -->
            <div style="font-size: 0.74rem; color: var(--color-text-secondary); margin-bottom: 1rem;"
                 x-text="'Hourly budget: ' + ($store.genesisDashboard.health.cc_sessions?.background?.hourly_budget || '—') + ' sessions started this hour (a rate cap — not a session count)'"></div>

            <!-- Sessions table -->
            <template x-if="($store.genesisDashboard.ccSessionsModal.data.sessions || []).length === 0">
              <div style="font-size: 0.78rem; color: var(--color-text-secondary); padding: 1rem; text-align: center;">
                No CC sessions in the last 24 hours.
              </div>
            </template>
            <div style="max-height: 420px; overflow-y: auto;">
              <template x-for="s in ($store.genesisDashboard.ccSessionsModal.data.sessions || []).filter(s => {
                const f = $store.genesisDashboard.ccSessionsModal.filter;
                if (!f) return true;
                if (f === 'discrepant') return (s.flags || []).length > 0;
                return s.status === f;
              })" :key="s.id">
                <div style="font-size: 0.78rem; padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 0.5rem;">
                  <span class="status-dot" :style="`background: ${s.status === 'active' ? '#4caf50' : s.status === 'failed' ? '#d9534f' : s.status === 'completed' ? '#64748b' : '#f0ad4e'}`"></span>
                  <span style="font-family: monospace; min-width: 74px;" :title="s.cc_session_id || s.id"
                        x-text="(s.cc_session_id || s.id).slice(0, 8)"></span>
                  <span style="min-width: 52px; color: var(--color-text-secondary);"
                        x-text="s.session_type === 'foreground' ? 'fg' : s.session_type === 'background_reflection' ? 'bg-refl' : 'bg-task'"></span>
                  <span style="min-width: 90px; color: var(--color-text-secondary); text-overflow: ellipsis; overflow: hidden; white-space: nowrap;"
                        x-text="s.model || '-'" :title="s.model || ''"></span>
                  <span style="min-width: 108px; color: var(--color-text-secondary);"
                        x-text="s.started_at ? $store.genesisDashboard.formatDateTime(s.started_at) : '-'"></span>
                  <span style="min-width: 74px; color: var(--color-text-secondary);"
                        :title="'idle'"
                        x-text="s.idle_s != null ? $store.genesisDashboard.formatAgeSeconds(s.idle_s) + ' idle' : '-'"></span>
                  <span style="min-width: 108px;" :style="`color: ${s.live ? '#3b82f6' : 'var(--color-text-secondary)'}`"
                        x-text="s.live ? ('#' + s.live.slot + ' pid ' + s.live.pid + ' ' + (s.live.rss_mb / 1024).toFixed(1) + 'G') : '—'"></span>
                  <template x-if="$store.genesisDashboard.ccSessionsModal.data.charters_available">
                    <span style="min-width: 130px; flex: 1; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;"
                          :title="s.charter ? ((s.charter.mission || 'no mission') + ' · ' + s.charter.compaction_count + ' compactions · ' + s.charter.ledger_open + ' open of ' + s.charter.ledger_total) : 'no charter'"
                          x-text="s.charter ? ((s.charter.mission || '(no mission)').slice(0, 40) + ' ⟳' + s.charter.compaction_count + ' · ' + s.charter.ledger_open + ' open') : '—'"></span>
                  </template>
                  <template x-if="(s.flags || []).includes('db_active_no_proc')">
                    <span style="font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: rgba(217,83,79,0.15); color: #d9534f; white-space: nowrap;">db-active, no proc</span>
                  </template>
                  <template x-if="(s.flags || []).includes('proc_but_db_inactive')">
                    <span style="font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: rgba(240,173,78,0.15); color: #f0ad4e; white-space: nowrap;"
                          x-text="'proc alive, db says ' + s.status"></span>
                  </template>
                </div>
              </template>
            </div>

            <!-- Live processes with no DB row -->
            <template x-if="($store.genesisDashboard.ccSessionsModal.data.unmatched_slots || []).length > 0">
              <div style="margin-top: 1rem; padding: 0.5rem 0.8rem; background: rgba(217,83,79,0.08); border-radius: 6px; border: 1px solid rgba(217,83,79,0.2);">
                <div style="font-size: 0.78rem; font-weight: 600; color: #d9534f; margin-bottom: 0.3rem;">Live processes with no DB session row</div>
                <template x-for="u in $store.genesisDashboard.ccSessionsModal.data.unmatched_slots" :key="u.pid">
                  <div style="font-size: 0.75rem; color: #f87171;"
                       x-text="'#' + u.slot + ' pid ' + u.pid + ' ' + (u.rss_mb / 1024).toFixed(1) + 'G (' + u.status + ')'"></div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>
