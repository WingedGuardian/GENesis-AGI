

  <!-- Outreach Messages Modal (deprecated — moved to Chat tab Communication panel) -->
  <div class="config-modal-overlay" x-show="false"
       x-transition>
    <div class="config-modal" style="max-width: 800px; max-height: 85vh;">
      <div class="config-modal-header">
        <span>Outreach Messages</span>
        <span class="panel-status">
          <span class="status-dot" :style="`background:${$store.genesisDashboard.modalStateColor($store.genesisDashboard.outreachModal)}`"></span>
          <span x-text="$store.genesisDashboard.modalStateLabel($store.genesisDashboard.outreachModal)"></span>
        </span>
        <button @click="$store.genesisDashboard.outreachModal.open = false">&times;</button>
      </div>
      <div class="config-modal-body">
        <template x-if="$store.genesisDashboard.modalStatusDetail($store.genesisDashboard.outreachModal)">
          <div class="panel-status-detail" style="margin-bottom: 0.75rem;"
               x-text="$store.genesisDashboard.modalStatusDetail($store.genesisDashboard.outreachModal)"></div>
        </template>
        <div x-show="$store.genesisDashboard.outreachModal.fetch.state === 'loading' && $store.genesisDashboard.outreachModal.messages.length === 0"
             style="text-align: center; padding: 2rem; color: var(--color-text-secondary);">Loading...</div>
        <div x-show="$store.genesisDashboard.outreachModal.fetch.state === 'error' && $store.genesisDashboard.outreachModal.messages.length === 0"
             class="empty-state">Outreach history unavailable.</div>
        <template x-if="$store.genesisDashboard.outreachModal.messages.length > 0 || $store.genesisDashboard.outreachModal.fetch.state !== 'loading'">
          <div>
            <!-- Pending approvals banner -->
            <template x-if="$store.genesisDashboard.outreachModal.pendingApprovals.length > 0">
              <div style="background: #d9534f1a; border: 1px solid #d9534f44; border-radius: 6px; padding: 0.6rem 0.75rem; margin-bottom: 0.75rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                  <span style="font-weight: 600; font-size: 0.82rem; color: #d9534f;">
                    Action Required
                    <span style="background: #d9534f; color: white; font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 10px; margin-left: 0.3rem;"
                          x-text="$store.genesisDashboard.outreachModal.pendingApprovals.length"></span>
                  </span>
                  <button style="font-size: 0.68rem; padding: 0.2rem 0.5rem; border: 1px solid #4caf50; color: #4caf50; border-radius: 3px; cursor: pointer; background: transparent;"
                          @click="$store.genesisDashboard.approveAllPending()">Approve All</button>
                </div>
                <template x-for="a in $store.genesisDashboard.outreachModal.pendingApprovals" :key="a.id">
                  <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; border-top: 1px solid #d9534f22;">
                    <div>
                      <span style="font-size: 0.75rem;" x-text="a.description || a.action_type"></span>
                      <span style="font-size: 0.62rem; color: #888; margin-left: 0.3rem;" x-text="$store.genesisDashboard.formatDateTime(a.created_at)"></span>
                    </div>
                    <div style="display: flex; gap: 0.25rem;">
                      <button style="font-size: 0.65rem; padding: 0.15rem 0.4rem; border: 1px solid #4caf50; color: #4caf50; border-radius: 3px; cursor: pointer; background: transparent;"
                              @click="$store.genesisDashboard.resolveApproval(a.id, 'approved')">Approve</button>
                      <button style="font-size: 0.65rem; padding: 0.15rem 0.4rem; border: 1px solid #d9534f; color: #d9534f; border-radius: 3px; cursor: pointer; background: transparent;"
                              @click="$store.genesisDashboard.resolveApproval(a.id, 'rejected')">Deny</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <!-- Category filters -->
            <div style="display: flex; gap: 0.4rem; margin-bottom: 0.75rem; flex-wrap: wrap;">
              <template x-for="cat in [null, 'alert', 'digest', 'surplus', 'blocker']" :key="cat || 'all'">
                <button style="font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 3px; cursor: pointer; transition: opacity 0.15s;"
                        :style="`border: 1px solid ${cat ? '#888' : '#4caf50'}; background: ${$store.genesisDashboard.outreachModal.categoryFilter === cat ? (cat ? '#88888833' : '#4caf5033') : 'transparent'}; color: ${$store.genesisDashboard.outreachModal.categoryFilter === cat ? '#fff' : '#aaa'}; opacity: ${$store.genesisDashboard.outreachModal.categoryFilter === cat || $store.genesisDashboard.outreachModal.categoryFilter === null && cat === null ? '1' : '0.6'}`"
                        @click="$store.genesisDashboard.outreachModal.categoryFilter = cat"
                        x-text="cat ? cat.charAt(0).toUpperCase() + cat.slice(1) : 'All'"></button>
              </template>
            </div>
            <template x-if="$store.genesisDashboard.outreachModal.messages.length === 0 && $store.genesisDashboard.outreachModal.fetch.state !== 'error'">
              <div style="color: var(--color-text-secondary); text-align: center; padding: 2rem;">No outreach messages found.</div>
            </template>
            <template x-for="msg in $store.genesisDashboard.outreachModal.messages.filter(m => !$store.genesisDashboard.outreachModal.categoryFilter || m.category === $store.genesisDashboard.outreachModal.categoryFilter)" :key="msg.id">
              <div style="border: 1px solid var(--color-border); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                  <div>
                    <span style="font-weight: 600; font-size: 0.85rem;" x-text="msg.topic || msg.signal_type || 'Untitled'"></span>
                    <span style="font-size: 0.68rem; padding: 0.1rem 0.3rem; border-radius: 3px; margin-left: 0.3rem;"
                          :style="`background: ${(msg.category === 'blocker' || msg.category === 'approval') ? '#d9534f33' : msg.category === 'alert' ? '#f0ad4e33' : msg.category === 'digest' ? '#2196F333' : '#4caf5033'}; color: ${(msg.category === 'blocker' || msg.category === 'approval') ? '#d9534f' : msg.category === 'alert' ? '#f0ad4e' : msg.category === 'digest' ? '#2196F3' : '#4caf50'}`"
                          x-text="msg.category"></span>
                  </div>
                  <span style="font-size: 0.68rem; color: var(--color-text-secondary);"
                        x-text="msg.channel + ' · ' + $store.genesisDashboard.formatDateTime(msg.created_at)"></span>
                </div>
                <div style="font-size: 0.8rem; white-space: pre-wrap; max-height: 150px; overflow-y: auto; padding: 0.4rem; background: var(--color-background); border-radius: 4px; margin-bottom: 0.3rem;"
                     x-text="msg.message_content || '(no content)'"></div>
                <!-- Engagement buttons — category-aware -->
                <div style="display: flex; gap: 0.3rem; align-items: center;">
                  <template x-if="msg.engagement_outcome && !['useful','not_useful','ambivalent'].includes(msg.engagement_outcome)">
                    <span style="font-size: 0.68rem; color: #888; margin-right: 0.3rem;"
                          x-text="'Currently: ' + (msg.engagement_outcome === 'ignored' ? 'ignored (auto)' : msg.user_response || msg.engagement_outcome)"></span>
                  </template>
                  <!-- Blocker: Approve/Deny — wire to approval API when matching -->
                  <template x-if="msg.category === 'blocker' || msg.category === 'approval'">
                    <div style="display: flex; gap: 0.3rem; align-items: center;">
                      <template x-for="btn in [{value: 'approved', label: 'Approve', color: '#4caf50'}, {value: 'rejected', label: 'Deny', color: '#d9534f'}]" :key="btn.value">
                        <button style="font-size: 0.68rem; padding: 0.2rem 0.5rem; border-radius: 3px; cursor: pointer; transition: all 0.15s;"
                                :style="`border: 1px solid ${btn.color}; color: ${btn.color}; background: ${msg.user_response === (btn.value === 'approved' ? 'approve' : 'deny') ? btn.color + '33' : 'transparent'}; font-weight: ${msg.user_response === (btn.value === 'approved' ? 'approve' : 'deny') ? '700' : '400'}; opacity: ${!msg.user_response || msg.user_response === (btn.value === 'approved' ? 'approve' : 'deny') ? '1' : '0.4'}`"
                                @click="(() => { const a = $store.genesisDashboard.findMatchingApproval(msg); if (a) { $store.genesisDashboard.resolveApproval(a.id, btn.value, msg.id); } else { $store.genesisDashboard.engageOutreach(msg.id, btn.value === 'approved' ? 'useful' : 'not_useful', btn.value === 'approved' ? 'approve' : 'deny'); } })()"
                                x-text="btn.label"></button>
                      </template>
                      <template x-if="$store.genesisDashboard.findMatchingApproval(msg)">
                        <span style="font-size: 0.6rem; color: #4caf50; margin-left: 0.3rem;">linked</span>
                      </template>
                    </div>
                  </template>
                  <!-- Alert: Acknowledge -->
                  <template x-if="msg.category === 'alert'">
                    <button style="font-size: 0.68rem; padding: 0.2rem 0.5rem; border-radius: 3px; cursor: pointer; transition: all 0.15s;"
                            :style="`border: 1px solid #f0ad4e; color: #f0ad4e; background: ${msg.engagement_outcome === 'useful' ? '#f0ad4e33' : 'transparent'}; font-weight: ${msg.engagement_outcome === 'useful' ? '700' : '400'}`"
                            @click="$store.genesisDashboard.engageOutreach(msg.id, 'useful')"
                            x-text="msg.engagement_outcome === 'useful' ? 'Acknowledged' : 'Acknowledge'"></button>
                  </template>
                  <!-- Digest/Surplus: Useful/Not Useful/Ambivalent -->
                  <template x-if="msg.category !== 'blocker' && msg.category !== 'alert' && msg.category !== 'approval'">
                    <div style="display: flex; gap: 0.3rem;">
                      <template x-for="btn in [{value: 'useful', label: 'Useful', color: '#4caf50'}, {value: 'not_useful', label: 'Not Useful', color: '#d9534f'}, {value: 'ambivalent', label: 'Ambivalent', color: '#888'}]" :key="btn.value">
                        <button style="font-size: 0.68rem; padding: 0.2rem 0.5rem; border-radius: 3px; cursor: pointer; transition: all 0.15s;"
                                :style="`border: 1px solid ${btn.color}; color: ${btn.color}; background: ${msg.engagement_outcome === btn.value ? btn.color + '33' : 'transparent'}; font-weight: ${msg.engagement_outcome === btn.value ? '700' : '400'}; opacity: ${!msg.engagement_outcome || msg.engagement_outcome === btn.value ? '1' : '0.4'}`"
                                @click="$store.genesisDashboard.engageOutreach(msg.id, btn.value)"
                                x-text="btn.label"></button>
                      </template>
                    </div>
                  </template>
                </div>
                <div style="font-size: 0.62rem; color: var(--color-text-secondary); margin-top: 0.15rem; opacity: 0.7;"
                     x-text="(msg.category === 'blocker' || msg.category === 'approval') ? 'Approve or deny this request' : msg.category === 'alert' ? 'Acknowledge to dismiss' : msg.category === 'digest' ? 'Feedback shapes report content over time' : 'Feedback guides task prioritization'"></div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>
