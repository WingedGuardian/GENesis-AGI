

    <!-- Config file viewer modal -->
    <div class="config-modal-overlay" x-show="$store.genesisDashboard.configModal.open"
         @click.self="$store.genesisDashboard.closeConfigModal()" x-transition>
    <div class="config-modal">
      <div class="config-modal-header">
        <span x-text="$store.genesisDashboard.configModal.name"></span>
        <span class="panel-status">
          <span class="status-dot" :style="`background:${$store.genesisDashboard.modalStateColor($store.genesisDashboard.configModal)}`"></span>
          <span x-text="$store.genesisDashboard.modalStateLabel($store.genesisDashboard.configModal)"></span>
        </span>
        <button @click="$store.genesisDashboard.closeConfigModal()">&times;</button>
      </div>
      <div class="config-modal-body" style="padding:0;">
          <template x-if="$store.genesisDashboard.modalStatusDetail($store.genesisDashboard.configModal)">
            <div class="panel-status-detail" style="margin:0.75rem 1rem;"
                 x-text="$store.genesisDashboard.modalStatusDetail($store.genesisDashboard.configModal)"></div>
          </template>
          <div x-show="$store.genesisDashboard.configModal.fetch.state === 'loading' && !$store.genesisDashboard.configModal.content"
               style="color: var(--color-text-secondary); text-align: center; padding: 2rem;">
            Loading...
          </div>
          <div x-show="$store.genesisDashboard.configModal.fetch.state === 'error' && !$store.genesisDashboard.configModal.content"
               class="empty-state">
            Config file unavailable.
          </div>
          <div x-show="$store.genesisDashboard.configModal.content"
               id="config-ace-editor"
               style="width:100%;height:60vh;font-size:13px;"></div>
        </div>
        <div x-show="$store.genesisDashboard.configModal.content"
             style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;border-top:1px solid var(--color-border);">
          <button style="font-size:0.74rem;padding:0.3rem 0.7rem;border-radius:4px;border:1px solid rgba(33,150,243,0.28);color:#2196F3;background:transparent;cursor:pointer;"
                  x-show="$store.genesisDashboard.configModal.editable"
                  :disabled="!$store.genesisDashboard.configModal.dirty || $store.genesisDashboard.configModal.saving"
                  @click="$store.genesisDashboard.saveConfigFile()"
                  x-text="$store.genesisDashboard.configModal.saving ? 'Saving...' : 'Save'"></button>
          <button style="font-size:0.74rem;padding:0.3rem 0.7rem;border-radius:4px;border:1px solid rgba(217,83,79,0.28);color:#d9534f;background:transparent;cursor:pointer;"
                  x-show="$store.genesisDashboard.configModal.deletable"
                  @click="$store.genesisDashboard.deleteConfigFile()">Delete</button>
          <span x-show="$store.genesisDashboard.configModal.saveMessage"
                style="color:#4caf50;font-size:0.72rem;"
                x-text="$store.genesisDashboard.configModal.saveMessage"></span>
          <span x-show="$store.genesisDashboard.configModal.saveError"
                style="color:#d9534f;font-size:0.72rem;"
                x-text="$store.genesisDashboard.configModal.saveError"></span>
          <span x-show="!$store.genesisDashboard.configModal.editable"
                style="color:var(--color-text-secondary);font-size:0.72rem;">Read-only</span>
        </div>
      </div>
    </div>
