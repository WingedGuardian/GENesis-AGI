

  <!-- Module Detail Modal -->
  <div class="config-modal-overlay" x-show="$store.genesisDashboard.selectedModule"
       @click.self="$store.genesisDashboard.selectedModule = null" x-transition>
    <div class="config-modal" style="max-width: 600px;">
      <template x-if="$store.genesisDashboard.selectedModule">
        <div>
          <div class="config-modal-header">
            <span x-text="$store.genesisDashboard.selectedModule.name.replace('_', ' ')" style="text-transform: capitalize;"></span>
            <span style="font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: 500; margin-left: 0.5rem;"
                  :style="`background: ${$store.genesisDashboard.selectedModule.enabled ? '#1b5e20' : '#424242'}; color: ${$store.genesisDashboard.selectedModule.enabled ? '#81c784' : '#999'}`"
                  x-text="$store.genesisDashboard.selectedModule.enabled ? 'active' : 'disabled'"></span>
            <button @click="$store.genesisDashboard.selectedModule = null">&times;</button>
          </div>
          <div class="config-modal-body">
            <!-- Description -->
            <div style="margin-bottom: 1rem; line-height: 1.5; color: #ccc; font-size: 0.85rem;"
                 x-text="$store.genesisDashboard.selectedModule.description || 'No description available.'"></div>

            <!-- External Module Info -->
            <template x-if="$store.genesisDashboard.selectedModule.type === 'external'">
              <div style="margin-bottom: 0.75rem; padding: 0.6rem; background: rgba(33,150,243,0.06); border-radius: 6px; border: 1px solid rgba(33,150,243,0.15);">
                <div style="font-weight: 600; font-size: 0.78rem; color: #90caf9; margin-bottom: 0.4rem;">
                  <span class="material-symbols-outlined" style="font-size: 0.85rem; vertical-align: text-bottom;">lan</span>
                  External Program
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.4rem;">
                  <div style="padding: 0.3rem 0.4rem; background: rgba(255,255,255,0.04); border-radius: 4px;">
                    <div style="font-size: 0.65rem; color: #888;">IPC Method</div>
                    <div style="font-size: 0.8rem; color: #e0e0e0; font-weight: 600;" x-text="$store.genesisDashboard.selectedModule.ipc_method?.toUpperCase()"></div>
                  </div>
                  <div style="padding: 0.3rem 0.4rem; background: rgba(255,255,255,0.04); border-radius: 4px;">
                    <div style="font-size: 0.65rem; color: #888;">Connection</div>
                    <div style="font-size: 0.8rem; font-weight: 600;"
                         :style="$store.genesisDashboard.selectedModule.ipc_healthy ? 'color:#4caf50' : 'color:#d9534f'"
                         x-text="$store.genesisDashboard.selectedModule.ipc_healthy ? 'Connected' : 'Disconnected'"></div>
                  </div>
                  <template x-if="$store.genesisDashboard.selectedModule.has_lifecycle">
                    <div style="padding: 0.3rem 0.4rem; background: rgba(255,255,255,0.04); border-radius: 4px;">
                      <div style="font-size: 0.65rem; color: #888;">Lifecycle</div>
                      <div style="font-size: 0.8rem; color: #81c784; font-weight: 600;">SSH managed</div>
                    </div>
                  </template>
                  <template x-if="$store.genesisDashboard.selectedModule.health_endpoint">
                    <div style="padding: 0.3rem 0.4rem; background: rgba(255,255,255,0.04); border-radius: 4px;">
                      <div style="font-size: 0.65rem; color: #888;">Health Endpoint</div>
                      <div style="font-size: 0.75rem; color: #e0e0e0; font-family: monospace;" x-text="$store.genesisDashboard.selectedModule.health_endpoint"></div>
                    </div>
                  </template>
                </div>
                <template x-if="$store.genesisDashboard.selectedModule.ipc_url">
                  <div style="margin-top: 0.4rem; font-size: 0.72rem; color: #7986cb; font-family: monospace;" x-text="$store.genesisDashboard.selectedModule.ipc_url"></div>
                </template>
                <template x-if="$store.genesisDashboard.selectedModule.ipc_error">
                  <div style="margin-top: 0.3rem; font-size: 0.72rem; color: #ef9a9a;" x-text="$store.genesisDashboard.selectedModule.ipc_error"></div>
                </template>
              </div>
            </template>

            <!-- Research Profile -->
            <template x-if="$store.genesisDashboard.selectedModule.research_profile">
              <div style="margin-bottom: 0.75rem;">
                <span style="font-weight: 600; font-size: 0.78rem; color: #aaa;">Research Profile:</span>
                <span style="font-size: 0.78rem; color: #e0e0e0;" x-text="$store.genesisDashboard.selectedModule.research_profile"></span>
              </div>
            </template>

            <!-- Health (universal — assembled from existing data) -->
            <template x-if="$store.genesisDashboard.selectedModule.health">
              <div style="margin-bottom: 0.75rem;">
                <div style="font-weight: 600; font-size: 0.78rem; color: #aaa; margin-bottom: 0.4rem;">Health</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.4rem;">
                  <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                    <div style="font-size: 0.68rem; color: #888;">Status</div>
                    <div style="font-size: 0.82rem; font-weight: 600;"
                         :style="({'healthy':'color:#4caf50','error':'color:#d9534f','disabled':'color:#888','idle':'color:#f0ad4e','no_pipeline':'color:#f0ad4e','unknown':'color:#888'})[$store.genesisDashboard.selectedModule.health.status] || 'color:#888'"
                         x-text="$store.genesisDashboard.selectedModule.health.status"></div>
                  </div>
                  <template x-if="$store.genesisDashboard.selectedModule.health.last_run">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888;">Last Run</div>
                      <div style="font-size: 0.78rem; color: #e0e0e0;"
                           x-text="$store.genesisDashboard.relativeTime($store.genesisDashboard.selectedModule.health.last_run)"></div>
                    </div>
                  </template>
                  <template x-if="$store.genesisDashboard.selectedModule.health.success_rate != null">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888;">Success Rate</div>
                      <div style="font-size: 0.82rem; font-weight: 600;"
                           :style="$store.genesisDashboard.selectedModule.health.success_rate >= 90 ? 'color:#4caf50' : $store.genesisDashboard.selectedModule.health.success_rate >= 70 ? 'color:#f0ad4e' : 'color:#d9534f'"
                           x-text="$store.genesisDashboard.selectedModule.health.success_rate + '%'"></div>
                    </div>
                  </template>
                  <template x-if="$store.genesisDashboard.selectedModule.health.total_runs">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888;">Total Runs</div>
                      <div style="font-size: 0.82rem; color: #e0e0e0;"
                           x-text="$store.genesisDashboard.selectedModule.health.total_runs"></div>
                    </div>
                  </template>
                  <template x-if="$store.genesisDashboard.selectedModule.health.cost?.today_usd != null">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888;">Cost (today)</div>
                      <div style="font-size: 0.78rem; color: #e0e0e0;"
                           x-text="'$' + $store.genesisDashboard.selectedModule.health.cost.today_usd.toFixed(3) + ' (' + $store.genesisDashboard.selectedModule.health.cost.today_calls + ')'"></div>
                    </div>
                  </template>
                  <template x-if="$store.genesisDashboard.selectedModule.health.cost?.month_usd != null">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888;">Cost (month)</div>
                      <div style="font-size: 0.78rem; color: #e0e0e0;"
                           x-text="'$' + $store.genesisDashboard.selectedModule.health.cost.month_usd.toFixed(3)"></div>
                    </div>
                  </template>
                  <template x-if="$store.genesisDashboard.selectedModule.health.config_updated_at">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888;">Config Updated</div>
                      <div style="font-size: 0.78rem; color: #e0e0e0;"
                           x-text="$store.genesisDashboard.relativeTime($store.genesisDashboard.selectedModule.health.config_updated_at)"></div>
                    </div>
                  </template>
                </div>
                <template x-if="$store.genesisDashboard.selectedModule.health.last_error">
                  <div style="margin-top: 0.4rem; padding: 0.3rem 0.5rem; background: rgba(217,83,79,0.08); border-radius: 4px; border: 1px solid rgba(217,83,79,0.2);">
                    <div style="font-size: 0.68rem; color: #d9534f; font-weight: 600;">Last Error</div>
                    <div style="font-size: 0.72rem; color: #ef9a9a; font-family: monospace; word-break: break-all;"
                         x-text="$store.genesisDashboard.selectedModule.health.last_error"></div>
                  </div>
                </template>
              </div>
            </template>

            <!-- Stats -->
            <template x-if="$store.genesisDashboard.selectedModule.stats">
              <div style="margin-bottom: 0.75rem;">
                <div style="font-weight: 600; font-size: 0.78rem; color: #aaa; margin-bottom: 0.4rem;">Statistics</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.4rem;">
                  <template x-for="(val, key) in $store.genesisDashboard.selectedModule.stats" :key="key">
                    <div style="padding: 0.4rem 0.5rem; background: rgba(255,255,255,0.04); border-radius: 5px; border: 1px solid var(--color-border);">
                      <div style="font-size: 0.68rem; color: #888; text-transform: capitalize;" x-text="key.replace('_', ' ')"></div>
                      <div style="font-size: 0.9rem; font-weight: 600; color: #e0e0e0;"
                           x-text="typeof val === 'number' && !Number.isInteger(val) ? val.toFixed(3) : val"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Configurable Fields -->
            <template x-if="($store.genesisDashboard.selectedModule.config_fields || []).length > 0">
              <div style="margin-bottom: 0.75rem;">
                <div style="font-weight: 600; font-size: 0.78rem; color: #aaa; margin-bottom: 0.4rem;">Configuration</div>
                <div style="display: grid; gap: 0.4rem;" x-data="{ saving: false, saved: false, saveError: '' }">
                  <template x-for="field in $store.genesisDashboard.selectedModule.config_fields" :key="field.name">
                    <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem;">
                      <!-- Label — asterisk for required fields -->
                      <label style="min-width: 140px; color: #ccc;" :title="field.description">
                        <span x-text="field.label"></span>
                        <template x-if="field.required"><span style="color: #ef9a9a; margin-left: 2px;">*</span></template>
                      </label>
                      <!-- Bool: toggle switch -->
                      <template x-if="field.type === 'bool'">
                        <label style="position: relative; display: inline-block; width: 36px; height: 20px; cursor: pointer;">
                          <input type="checkbox" :checked="field.value" @change="field.value = $el.checked"
                                 style="opacity: 0; width: 0; height: 0;">
                          <span :style="'position: absolute; inset: 0; border-radius: 10px; transition: 0.2s; ' +
                            (field.value ? 'background: #66bb6a;' : 'background: rgba(255,255,255,0.15);')"></span>
                          <span :style="'position: absolute; top: 2px; width: 16px; height: 16px; border-radius: 50%; transition: 0.2s; background: #fff; ' +
                            (field.value ? 'left: 18px;' : 'left: 2px;')"></span>
                        </label>
                      </template>
                      <!-- List: comma-separated text input -->
                      <template x-if="field.type === 'list'">
                        <input type="text"
                               :value="Array.isArray(field.value) ? field.value.join(', ') : field.value"
                               @change="field.value = $el.value.split(',').map(s => s.trim()).filter(s => s)"
                               style="width: 200px; padding: 0.25rem 0.4rem; border-radius: 4px; border: 1px solid var(--color-border); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.78rem;"
                               placeholder="comma-separated values">
                      </template>
                      <!-- Str: plain text input -->
                      <template x-if="field.type === 'str'">
                        <input type="text"
                               :value="field.value"
                               @change="field.value = $el.value"
                               :placeholder="field.default !== undefined && field.default !== null ? String(field.default) : ''"
                               style="width: 200px; padding: 0.25rem 0.4rem; border-radius: 4px; border: 1px solid var(--color-border); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.78rem;">
                      </template>
                      <!-- Secret: masked input, never pre-populated -->
                      <template x-if="field.type === 'secret'">
                        <input type="password"
                               placeholder="••••••••"
                               @change="field.value = $el.value"
                               autocomplete="new-password"
                               style="width: 200px; padding: 0.25rem 0.4rem; border-radius: 4px; border: 1px solid var(--color-border); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.78rem;">
                      </template>
                      <!-- Enum: select dropdown -->
                      <template x-if="field.type === 'enum'">
                        <select :value="field.value" @change="field.value = $el.value"
                                style="width: 200px; padding: 0.25rem 0.4rem; border-radius: 4px; border: 1px solid var(--color-border); background: rgba(30,30,30,0.9); color: #e0e0e0; font-size: 0.78rem;">
                          <template x-for="opt in (field.options || [])" :key="opt.value">
                            <option :value="opt.value" :selected="opt.value == field.value" x-text="opt.label"></option>
                          </template>
                        </select>
                      </template>
                      <!-- Int: integer number input -->
                      <template x-if="field.type === 'int'">
                        <input type="number" step="1"
                               :value="field.value"
                               :min="field.min !== undefined && field.min !== null ? field.min : undefined"
                               :max="field.max !== undefined && field.max !== null ? field.max : undefined"
                               :placeholder="field.default !== undefined && field.default !== null ? String(field.default) : ''"
                               @change="field.value = parseInt($el.value, 10)"
                               style="width: 100px; padding: 0.25rem 0.4rem; border-radius: 4px; border: 1px solid var(--color-border); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.78rem;">
                      </template>
                      <!-- Float: decimal number input -->
                      <template x-if="field.type === 'float'">
                        <input type="number" step="any"
                               :value="field.value"
                               :min="field.min !== undefined && field.min !== null ? field.min : undefined"
                               :max="field.max !== undefined && field.max !== null ? field.max : undefined"
                               :placeholder="field.default !== undefined && field.default !== null ? String(field.default) : ''"
                               @change="field.value = parseFloat($el.value)"
                               style="width: 100px; padding: 0.25rem 0.4rem; border-radius: 4px; border: 1px solid var(--color-border); background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 0.78rem;">
                      </template>
                      <span style="font-size: 0.64rem; opacity: 0.5;" x-text="field.description"></span>
                    </div>
                  </template>
                  <!-- Save error message -->
                  <template x-if="saveError">
                    <div style="font-size: 0.72rem; color: #ef9a9a; padding: 0.2rem 0;" x-text="saveError"></div>
                  </template>
                  <button @click="
                    saveError = '';
                    // Frontend pre-validation
                    const fields = $store.genesisDashboard.selectedModule.config_fields;
                    const errs = [];
                    fields.forEach(f => {
                      if (f.required && (f.value === null || f.value === undefined || f.value === '')) {
                        errs.push(f.label + ' is required');
                      }
                      if ((f.type === 'int' || f.type === 'float') && f.value !== null && f.value !== undefined && f.value !== '') {
                        const v = parseFloat(f.value);
                        if (f.min !== undefined && f.min !== null && v < f.min) errs.push(f.label + ' must be >= ' + f.min);
                        if (f.max !== undefined && f.max !== null && v > f.max) errs.push(f.label + ' must be <= ' + f.max);
                      }
                    });
                    if (errs.length > 0) { saveError = errs.join('; '); return; }
                    saving = true; saved = false;
                    const updates = {};
                    fields.forEach(f => {
                      // Secret fields: only include if user typed a value
                      if (f.type === 'secret') { if (f.value) updates[f.name] = f.value; }
                      else updates[f.name] = f.value;
                    });
                    fetch('/api/genesis/modules/' + $store.genesisDashboard.selectedModule.name + '/config', {
                      method: 'PATCH', headers: {'Content-Type': 'application/json'},
                      body: JSON.stringify(updates)
                    }).then(r => r.json()).then(d => {
                      saving = false;
                      if (d.status === 'ok') { saved = true; setTimeout(() => saved = false, 2000); }
                      else { saveError = d.message || 'Save failed'; }
                    }).catch(() => { saving = false; saveError = 'Network error'; });
                  " style="width: fit-content; font-size: 0.74rem; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; background: rgba(33,150,243,0.15); color: #90caf9; border: 1px solid rgba(33,150,243,0.3);"
                  x-text="saving ? 'Saving...' : saved ? 'Saved!' : 'Save Config'"></button>
                </div>
              </div>
            </template>

            <!-- Controls -->
            <div style="border-top: 1px solid var(--color-border); padding-top: 0.75rem; display: flex; gap: 0.5rem;">
              <button @click="$store.genesisDashboard.toggleModule($store.genesisDashboard.selectedModule.name); $store.genesisDashboard.selectedModule.enabled = !$store.genesisDashboard.selectedModule.enabled;"
                      style="font-size: 0.78rem; padding: 0.4rem 0.8rem; border-radius: 5px; cursor: pointer; border: 1px solid; font-weight: 500;"
                      :style="$store.genesisDashboard.selectedModule.enabled
                        ? 'background: transparent; color: #ef9a9a; border-color: #ef9a9a;'
                        : 'background: transparent; color: #81c784; border-color: #81c784;'"
                      x-text="$store.genesisDashboard.selectedModule.enabled ? 'Disable Module' : 'Enable Module'"></button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
