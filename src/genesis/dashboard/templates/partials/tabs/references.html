

    <div class="panel" x-show="$store.genesisDashboard.activeTab === 'references'" style="overflow-y: auto; max-height: calc(100vh - 180px);">
      <div class="panel-header">
        <span class="material-symbols-outlined">key</span>
        Reference Store
      </div>
      <div style="padding: 1rem;">

      <div style="margin-bottom: 1rem; color: var(--color-text-secondary); font-size: .85em;">
        Credentials, URLs, IPs, account handles and other lookup data Genesis has stored.
        Descriptions are shown freely; secret values stay hidden until you reveal them.
      </div>

      <!-- Stats Cards -->
      <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 100px; background: var(--color-background); border-radius: 6px; padding: .75rem; text-align: center;">
          <div style="font-size: 1.4rem; font-weight: 700;" x-text="$store.genesisDashboard.referenceStats?.total ?? $store.genesisDashboard.referenceTotal ?? '—'"></div>
          <div style="font-size: .75rem; color: var(--color-text-secondary);">Total</div>
        </div>
        <div style="flex: 1; min-width: 100px; background: var(--color-background); border-radius: 6px; padding: .75rem; text-align: center;">
          <div style="font-size: 1.4rem; font-weight: 700; color: var(--color-primary);" x-text="$store.genesisDashboard.referenceStats?.by_tier?.reference_store ?? 0"></div>
          <div style="font-size: .75rem; color: var(--color-text-secondary);">Verified</div>
        </div>
        <div style="flex: 1; min-width: 100px; background: var(--color-background); border-radius: 6px; padding: .75rem; text-align: center;">
          <div style="font-size: 1.4rem; font-weight: 700; color: var(--color-warning-text);" x-text="$store.genesisDashboard.referenceStats?.by_tier?.extraction_job ?? 0"></div>
          <div style="font-size: .75rem; color: var(--color-text-secondary);">Auto-captured</div>
        </div>
        <div style="flex: 1; min-width: 100px; background: var(--color-background); border-radius: 6px; padding: .75rem; text-align: center;">
          <div style="font-size: 1.4rem; font-weight: 700;" x-text="Object.keys($store.genesisDashboard.referenceByKind ?? {}).length"></div>
          <div style="font-size: .75rem; color: var(--color-text-secondary);">Kinds</div>
        </div>
      </div>

      <!-- Filter + Search -->
      <div style="margin-bottom: 1rem; display: flex; gap: .5rem;">
        <select x-model="$store.genesisDashboard.referenceKindFilter" @change="$store.genesisDashboard.searchReferences()"
                style="padding: .5rem; background: var(--color-background); border: 1px solid var(--color-border); color: var(--color-text); border-radius: 4px;">
          <option value="">All kinds</option>
          <template x-for="k in $store.genesisDashboard.referenceKinds" :key="k">
            <option :value="k" x-text="k"></option>
          </template>
        </select>
        <input type="text" x-model="$store.genesisDashboard.referenceQuery" placeholder="Search references..."
               @keyup.enter="$store.genesisDashboard.searchReferences()"
               style="flex: 1; padding: .5rem; background: var(--color-background); border: 1px solid var(--color-border); color: var(--color-text); border-radius: 4px;">
        <button @click="$store.genesisDashboard.searchReferences()" class="btn-sm">Search</button>
        <button x-show="$store.genesisDashboard.referenceQuery || $store.genesisDashboard.referenceKindFilter"
                @click="$store.genesisDashboard.referenceQuery=''; $store.genesisDashboard.referenceKindFilter=''; $store.genesisDashboard.referenceSearchResults=[]" class="btn-sm" style="opacity:.7;">Clear</button>
      </div>

      <!-- Search Results -->
      <template x-if="$store.genesisDashboard.referenceSearchResults.length > 0">
        <div style="margin-bottom: 1.5rem;">
          <h4 style="margin-bottom: .5rem;">Search Results</h4>
          <div style="display: flex; flex-direction: column; gap: .5rem;">
            <template x-for="ref in $store.genesisDashboard.referenceSearchResults" :key="ref.id">
              <div style="background: var(--color-background); border: 1px solid var(--color-border); border-radius: 6px; padding: .75rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; gap:.5rem;">
                  <strong x-text="ref.concept || ref.id" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor:pointer;"
                          @click="$store.genesisDashboard.viewReferenceDetail(ref.id)"></strong>
                  <div style="display:flex; gap:.35rem; align-items:center; flex-shrink:0;">
                    <span style="font-size:.6rem; padding:1px 6px; border-radius:3px; background: var(--color-panel);" x-text="ref.kind"></span>
                    <span :style="`font-size:.6rem; padding:1px 6px; border-radius:3px; background:${$store.genesisDashboard._provenanceColor(ref.source_pipeline)}22; color:${$store.genesisDashboard._provenanceColor(ref.source_pipeline)};`"
                          x-text="$store.genesisDashboard._provenanceLabel(ref.source_pipeline)"></span>
                    <button class="btn-sm" style="padding:.15rem .4rem;"
                            @click="$store.genesisDashboard.revealedValues[ref.id] !== undefined ? $store.genesisDashboard.hideReference(ref.id) : $store.genesisDashboard.revealReference(ref.id)">
                      <span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle;"
                            x-text="$store.genesisDashboard.revealedValues[ref.id] !== undefined ? 'visibility_off' : 'visibility'"></span>
                    </button>
                  </div>
                </div>
                <div style="font-size: .85em; color: var(--color-text-secondary); margin-top: .25rem;" x-text="ref.description"></div>
                <template x-if="$store.genesisDashboard.revealedValues[ref.id] !== undefined">
                  <div style="display:flex; align-items:center; gap:.5rem; margin-top:.4rem; background:var(--color-panel); border-radius:4px; padding:.4rem .6rem;">
                    <code style="flex:1; word-break:break-all; font-size:.85em;" x-text="$store.genesisDashboard.revealedValues[ref.id] || '(no value found)'"></code>
                    <button class="btn-sm" style="padding:.15rem .4rem;" @click="$store.genesisDashboard.copyReferenceValue(ref.id)">copy</button>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Grouped by Kind -->
      <template x-if="Object.keys($store.genesisDashboard.referenceByKind).length === 0">
        <p style="color: var(--color-text-secondary);">No references stored yet.</p>
      </template>
      <template x-for="[kind, entries] in Object.entries($store.genesisDashboard.referenceByKind)" :key="kind">
        <div style="margin-bottom: 1.25rem;" x-show="!$store.genesisDashboard.referenceKindFilter || kind === $store.genesisDashboard.referenceKindFilter">
          <h4 style="margin-bottom: .5rem; text-transform: capitalize;">
            <span x-text="kind"></span>
            <span style="color: var(--color-text-secondary); font-weight: 400;" x-text="'(' + entries.length + ')'"></span>
          </h4>
          <div style="display: flex; flex-direction: column; gap: .5rem;">
            <template x-for="ref in entries" :key="ref.id">
              <div style="background: var(--color-background); border: 1px solid var(--color-border); border-radius: 6px; padding: .75rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; gap:.5rem;">
                  <strong x-text="ref.concept || ref.id" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor:pointer;"
                          @click="$store.genesisDashboard.viewReferenceDetail(ref.id)"></strong>
                  <div style="display:flex; gap:.35rem; align-items:center; flex-shrink:0;">
                    <span :style="`font-size:.6rem; padding:1px 6px; border-radius:3px; background:${$store.genesisDashboard._provenanceColor(ref.source_pipeline)}22; color:${$store.genesisDashboard._provenanceColor(ref.source_pipeline)};`"
                          x-text="$store.genesisDashboard._provenanceLabel(ref.source_pipeline)"></span>
                    <button class="btn-sm" style="padding:.15rem .4rem;"
                            @click="$store.genesisDashboard.revealedValues[ref.id] !== undefined ? $store.genesisDashboard.hideReference(ref.id) : $store.genesisDashboard.revealReference(ref.id)">
                      <span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle;"
                            x-text="$store.genesisDashboard.revealedValues[ref.id] !== undefined ? 'visibility_off' : 'visibility'"></span>
                    </button>
                  </div>
                </div>
                <div style="font-size: .85em; color: var(--color-text-secondary); margin-top: .25rem;" x-text="ref.description"></div>
                <template x-if="$store.genesisDashboard.revealedValues[ref.id] !== undefined">
                  <div style="display:flex; align-items:center; gap:.5rem; margin-top:.4rem; background:var(--color-panel); border-radius:4px; padding:.4rem .6rem;">
                    <code style="flex:1; word-break:break-all; font-size:.85em;" x-text="$store.genesisDashboard.revealedValues[ref.id] || '(no value found)'"></code>
                    <button class="btn-sm" style="padding:.15rem .4rem;" @click="$store.genesisDashboard.copyReferenceValue(ref.id)">copy</button>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Detail Modal -->
      <template x-if="$store.genesisDashboard.referenceDetail">
        <div style="position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: center; justify-content: center;"
             @click.self="$store.genesisDashboard.referenceDetail = null">
          <div style="background: var(--color-panel); border: 1px solid var(--color-border); border-radius: 8px; padding: 1.5rem; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <h3 x-text="$store.genesisDashboard.referenceDetail.concept"></h3>
            <div style="margin: .75rem 0; font-size: .9em; color: var(--color-text-secondary);">
              <span x-text="'Kind: ' + $store.genesisDashboard.referenceDetail.kind"></span> |
              <span x-text="'Source: ' + $store.genesisDashboard._provenanceLabel($store.genesisDashboard.referenceDetail.source_pipeline)"></span> |
              <span x-text="'Confidence: ' + ($store.genesisDashboard.referenceDetail.confidence ?? '—')"></span> |
              <span x-text="$store.genesisDashboard.referenceDetail.ingested_at?.substring(0,10)"></span>
            </div>
            <div style="margin-bottom: .75rem;" x-text="$store.genesisDashboard.referenceDetail.description"></div>
            <!-- Reveal value -->
            <div style="margin: .75rem 0;">
              <template x-if="$store.genesisDashboard.revealedValues[$store.genesisDashboard.referenceDetail.id] === undefined">
                <button class="btn-sm" @click="$store.genesisDashboard.revealReference($store.genesisDashboard.referenceDetail.id)">
                  <span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle;">visibility</span> Reveal value
                </button>
              </template>
              <template x-if="$store.genesisDashboard.revealedValues[$store.genesisDashboard.referenceDetail.id] !== undefined">
                <div style="display:flex; align-items:center; gap:.5rem; background:var(--color-background); border-radius:4px; padding:.5rem .75rem;">
                  <code style="flex:1; word-break:break-all; font-family:monospace;" x-text="$store.genesisDashboard.revealedValues[$store.genesisDashboard.referenceDetail.id] || '(no value found)'"></code>
                  <button class="btn-sm" style="padding:.15rem .4rem;" @click="$store.genesisDashboard.copyReferenceValue($store.genesisDashboard.referenceDetail.id)">copy</button>
                  <button class="btn-sm" style="padding:.15rem .4rem; opacity:.7;" @click="$store.genesisDashboard.hideReference($store.genesisDashboard.referenceDetail.id)">hide</button>
                </div>
              </template>
            </div>
            <div style="display: flex; gap: .5rem; justify-content: space-between; margin-top: 1rem;">
              <button class="btn-sm btn-danger" @click="$store.genesisDashboard.deleteReference($store.genesisDashboard.referenceDetail.id)">Delete</button>
              <button class="btn-sm" @click="$store.genesisDashboard.referenceDetail = null">Close</button>
            </div>
          </div>
        </div>
      </template>
      </div><!-- /panel-body padding -->
    </div>
