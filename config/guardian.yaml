# Genesis Guardian — Host VM Health Monitor Configuration
# This file configures the Guardian systemd timer on the host VM.
# Secrets (bot token, chat ID) are loaded from secrets.env, not here.
#
# NOTE: install_guardian.sh generates a local copy with auto-detected
# container_ip. This template uses empty string for auto-detection.

container_name: genesis
container_ip: ""  # Auto-detected via `incus list` if empty
health_api_port: 5000
check_interval_s: 30
state_dir: "~/.local/state/genesis-guardian"

probes:
  probe_timeout_s: 10
  ping_count: 1
  ping_timeout_s: 3
  http_timeout_s: 10
  journal_lines: 1

suspicious:
  memory_warning_pct: 85.0
  tmp_warning_pct: 70.0
  tick_max_gap_s: 600
  tick_min_interval_s: 120
  tick_history_count: 10
  error_spike_window_min: 30
  error_spike_threshold: 50
  io_pressure_threshold_pct: 10.0

confirmation:
  recheck_delay_s: 30
  max_recheck_attempts: 3
  required_failed_signals: 2
  bootstrap_grace_s: 300
  pause_reminder_hours: 24

cc:
  enabled: true
  model: opus
  timeout_s: 3600    # 60 min — runaway guard, not operational limit
  max_turns: 50      # runaway guard — legitimate investigation is ~15-30 turns
  path: "claude"
  work_dir: "/var/lib/guardian-snapshots/cc-sessions"

briefing:
  enabled: true
  shared_subdir: "shared"
  briefing_filename: "guardian_briefing.md"
  max_age_s: 600

snapshots:
  # Non-healthy snapshots kept by delete-before-create (the latest healthy is
  # exempt and rotated separately): 2 = healthy lifeline + newest pre-recovery.
  retention: 2
  prefix: "guardian-"
  take_pre_recovery: false
  # Daily 'healthy' snapshot while state is HEALTHY — the offline
  # SNAPSHOT_ROLLBACK lifeline (rotated: exactly one, <=1 day old, so CoW
  # divergence never accumulates). Requires pool headroom (refused at the
  # storage_pool high tiers). Set false to disable.
  healthy_enabled: true
  max_pool_usage_pct: 80
  # Age-prune backstop: delete guardian-* snapshots older than this many days,
  # except the newest and the latest healthy (the rollback lifeline). Catches
  # stale guardian-pre-recovery snapshots that retention alone can protect
  # indefinitely as the "newest".
  max_age_days: 14
  # incus daemon-side auto-expiry of scheduled snapshots (guardian-independent
  # safety net). Empty string disables. NOT applied to manual snapshots.
  expiry: "2w"

# Host storage-pool monitoring (LVM-thin data% + metadata% + VG headroom).
# Tiered guardian alerts with hysteresis; metadata alerts earlier than data
# (metadata-full forces an offline thin_check/repair). This is the warning that
# was missing when the thin pool silently filled to 100%.
storage_pool:
  enabled: true
  data_warn_pct: 75
  data_high_pct: 85
  data_crit_pct: 92
  metadata_warn_pct: 60
  metadata_high_pct: 70
  metadata_crit_pct: 80
  realert_hours: 6

recovery:
  verification_delay_s: 30
  max_escalations: 3

# Hypervisor provisioning (rung 5 of the escalation ladder) — grow this VM's
# virtual disk or RAM from Proxmox to fix the structural vg_free=0 cause of a
# thin-pool outage. DISABLED BY DEFAULT and OFF unless you deliberately opt in.
# Every mutation is approval-gated (APPROVE/DENY) and rate-capped; the code
# never raises and never auto-retries. Full setup (scoped pveum tokens + the
# ACL gotcha, credential bridge, two-owner approval model, threat model):
#   docs/reference/proxmox-provisioning.md
# The two Proxmox API tokens are the ONLY secrets — they live in secrets.env
# (PROXMOX_AUDIT_TOKEN / PROXMOX_PROVISION_TOKEN), not here. Everything below
# is non-secret machine config. Kill switch: GUARDIAN_PROVISIONING_ENABLED=0.
provisioning:
  enabled: false
  provider: proxmox
  api_host: ""            # PVE host, e.g. 192.168.x.y — empty = unconfigured
  api_port: 8006
  verify_tls: true        # self-signed PVE → set false per-install (documented)
  node: ""                # PVE node name, e.g. "pve"
  vmid: 0                 # this container's host VM id, e.g. 300
  target_disk: scsi1      # the disk backing the LVM-thin PV
  storage: local-lvm      # PVE storage the disk lives on
  max_disk_step_gib: 32       # hard cap per single disk grow
  max_memory_step_mib: 4096   # hard cap per single memory grow
  storage_margin_gib: 64      # required free storage headroom above the grow
  node_memory_margin_mib: 8192  # required node-RAM headroom (keys on available)
  max_actions_per_week: 2     # rate cap (counts EXECUTED mutations)
  require_recent_backup: true # refuse a grow without a recent backup
  backup_max_age_days: 14
  approval_timeout_s: 1800    # bounded wait for APPROVE/DENY
  min_repropose_hours: 24     # damper on autonomous pool-crit re-proposals
  propose_on_pool_crit: true  # autonomous propose (Genesis-DOWN path) at crit tier
