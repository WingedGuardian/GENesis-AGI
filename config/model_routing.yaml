retry:
  default:
    max_retries: 3
    base_delay_ms: 500
    max_delay_ms: 30000
  user_facing:
    max_retries: 2
    base_delay_ms: 300
    max_delay_ms: 5000
  background:
    max_retries: 4
    base_delay_ms: 1000
    max_delay_ms: 60000
surplus:
  idle_threshold_minutes: 15
  dispatch_interval_minutes: 5
  brainstorm_check_interval_hours: 12
  task_expiry_hours: 72
  max_attempts: 2
  tier_policy:
    brainstorm_user:
    - free_api
    - local_30b
    brainstorm_self:
    - free_api
    - local_30b
    meta_brainstorm:
    - free_api
    - local_30b
  health_checks:
    lmstudio:
      url: ${LM_STUDIO_HEALTH_URL:-http://localhost:1234/v1/models}
      timeout_s: 3
      cache_ttl_s: 60
