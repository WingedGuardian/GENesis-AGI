providers:
  ollama-3b:
    type: ollama
    model: qwen2.5:3b
    profile: qwen2.5-3b
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    free: true
    enabled: ${GENESIS_ENABLE_OLLAMA:-true}
    keep_alive: -1
    open_duration_s: 60
  ollama-embedding:
    type: ollama
    model: ${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:0.6b-fp16}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    free: true
    enabled: ${GENESIS_ENABLE_OLLAMA:-true}
    keep_alive: -1
    open_duration_s: 60
  mistral-large-free:
    type: mistral
    model: mistral-large-latest
    profile: mistral-large-3
    free: true
    # Raised 2→4 on 2026-04-11 after a data-grounded review of observed
    # usage (memory/project_mistral_large_review.md). Actual call sizes
    # average ~3k tokens (not the 13k/call figure the earlier 2-rpm cap
    # was based on), so 4 rpm × ~5k worst-case ≈ 20k tokens/min leaves
    # ~60% headroom under the stated 50k tokens/min ceiling. The live
    # TPM header has NOT been reprobed in this pass — if observed usage
    # grows or call patterns shift above ~6k/call sustained, revisit
    # before going higher.
    rpm_limit: 4
    open_duration_s: 120
  mistral-small-free:
    type: mistral
    model: mistral-small-latest
    profile: mistral-small
    free: true
    # Mistral free tier publishes 60 req/min + 375k tokens/min for
    # mistral-small-latest (verified 2026-04-11 via x-ratelimit-limit-req-minute
    # header on a live probe). Setting to 30 leaves 50% headroom.
    rpm_limit: 30
    open_duration_s: 120
  groq-free:
    type: groq
    model: llama-3.3-70b-versatile
    profile: llama-3.3-70b
    free: true
    rpm_limit: 30
    open_duration_s: 120
  gemini-free:
    type: google
    model: gemini-3-flash-preview
    profile: gemini-3-flash
    free: true
    rpm_limit: 15
    open_duration_s: 120
  openrouter-free:
    type: openrouter
    model: qwen/qwen-2.5-72b-instruct
    profile: qwen-2.5-72b
    free: true
    rpm_limit: 20
    open_duration_s: 120
  # ── Phase 2 providers (gated on eval before chain promotion) ──
  cerebras-qwen:
    type: cerebras
    model: qwen-3-235b-a22b-instruct-2507
    profile: cerebras-qwen3-235b
    free: true
    # 10 RPM, 14,400 RPD. Instruct only (no thinking). Volume play.
    rpm_limit: 10
    open_duration_s: 120
  github-o3mini:
    type: github
    model: o3-mini
    profile: github-o3-mini
    free: true
    # Disabled: GitHub Models API does not currently serve o3-mini
    # (only gpt-4o, gpt-4o-mini, Llama 3.1 available as of 2026-04-14)
    enabled: false
    rpm_limit: 10
    open_duration_s: 120
  openrouter-gemma4:
    type: openrouter
    model: google/gemma-4-27b-it:free
    profile: gemma-4-27b
    free: true
    rpm_limit: 20
    open_duration_s: 120
  openrouter-qwen3coder:
    type: openrouter
    model: qwen/qwen3-coder-480b-a35b:free
    profile: qwen3-coder-480b
    free: true
    rpm_limit: 20
    open_duration_s: 120
  openrouter-deepseek-r1:
    type: openrouter
    model: deepseek/deepseek-r1:free
    profile: deepseek-r1
    free: true
    rpm_limit: 20
    open_duration_s: 120
  openrouter-mimo:
    type: openrouter
    model: xiaomi/mimo-v2-pro
    profile: mimo-v2-pro
    free: false
    rpm_limit: 20
    open_duration_s: 120
  deepseek-chat:
    type: deepseek
    model: deepseek-chat
    profile: deepseek-v3
    free: false
    open_duration_s: 120
  openai-gpt5:
    type: openai
    model: gpt-5.4
    profile: gpt-5.4
    free: false
    open_duration_s: 120
  xai-grok:
    type: xai
    model: grok-3-mini
    profile: grok-3-mini
    free: false
    open_duration_s: 120
  qwen-plus:
    type: qwen
    model: qwen3.5-plus
    profile: qwen-3.5-plus
    free: false
    open_duration_s: 120
  claude-haiku:
    type: anthropic
    model: claude-haiku-4-5-20251001
    profile: claude-haiku-4.5
    free: false
    open_duration_s: 120
  claude-sonnet:
    type: anthropic
    model: claude-sonnet-4-6-20250514
    profile: claude-sonnet-4.6
    free: false
    open_duration_s: 120
  claude-opus:
    type: anthropic
    model: claude-opus-4-6-20250514
    profile: claude-opus-4.6
    free: false
    open_duration_s: 120
  glm5:
    type: zenmux
    model: z-ai/glm-5-turbo
    profile: glm-5
    base_url: https://zenmux.ai/api/v1
    free: false
    open_duration_s: 120
  minimax-m25:
    type: minimax
    model: MiniMax-M2.5
    profile: minimax-m2.5
    base_url: https://api.minimaxi.com/v1
    free: false
    open_duration_s: 120
  openrouter-nemo:
    type: openrouter
    model: mistralai/mistral-nemo
    profile: mistral-nemo
    free: false
    rpm_limit: 20
    open_duration_s: 120
  gpt-5.4:
    type: openrouter
    model: openai/gpt-5.4
    profile: gpt-5.4
    free: false
    open_duration_s: 120
  kimi-k2.5:
    type: openrouter
    model: moonshotai/kimi-k2.5
    profile: kimi-k2.5
    free: false
    open_duration_s: 120
  openrouter-qwen36plus:
    type: openrouter
    model: qwen/qwen3.6-plus
    profile: qwen-3.6-plus
    free: false
    rpm_limit: 20
    open_duration_s: 120
  lmstudio-30b:
    type: lmstudio
    model: mistral-small-3.2-24b-instruct-2506
    profile: mistral-small-3.2-24b
    base_url: ${LM_STUDIO_URL:-http://localhost:1234/v1}
    free: true
    enabled: ${GENESIS_ENABLE_LM_STUDIO:-false}
    open_duration_s: 120
call_sites:
  2_triage:
    chain:
    - ollama-3b
    - mistral-small-free
    - groq-free
    - openrouter-free
  3_micro_reflection:
    chain:
    - mistral-small-free
    - groq-free
    - mistral-large-free
    - gemini-free
    - openrouter-free
    retry_profile: background
  4_light_reflection:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
    default_paid: false
    never_pays: true
  5_deep_reflection:
    chain:
    - claude-sonnet
    - claude-opus
    - gpt-5.4
    - glm5
    default_paid: true
    retry_profile: background
    never_pays: false
    cc_model: Sonnet
    dispatch: dual
    cc_position: 2
  6_strategic_reflection:
    chain:
    - claude-opus
    default_paid: true
    retry_profile: background
  7_ego_cycle_api:
    chain:
    - claude-sonnet
    - claude-opus
    default_paid: true
    retry_profile: background
    description: Autonomous ego cycle reasoning via API
  7_task_retrospective:
    chain:
    - openrouter-free
    default_paid: true
  8_ego_compaction:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
  9_fact_extraction:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
  10_cognitive_state:
    chain:
    - glm5
    - claude-sonnet
    default_paid: true
  11_user_model_synthesis:
    # LLM-narrative synthesis of the user model. Wired in
    # runtime/init/learning.py — every 48h the user_model_evolver job calls
    # router.call("11_user_model_synthesis", ...) with the current model dict
    # plus recent delta evidence, and writes the result to USER_KNOWLEDGE.md.
    # Free-first chain — synthesis is summary-quality work that does not
    # require frontier models. On all-free-exhausted, learning.py falls back
    # to Python dict rendering as graceful degradation.
    chain:
    - mistral-small-free
    - groq-free
    - gemini-free
    - openrouter-free
    retry_profile: background
  12_surplus_brainstorm:
    chain:
    - gemini-free
    - mistral-large-free
    - groq-free
    - openrouter-free
    never_pays: true
  13_morning_report:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
  14_weekly_self_assessment:
    chain:
    - claude-opus
    default_paid: true
  16_quality_calibration:
    chain:
    - claude-opus
    default_paid: true
  17_fresh_eyes_review:
    chain:
    - openrouter-free
    - claude-sonnet
    default_paid: true
  18_meta_prompting:
    chain:
    - openrouter-free
    default_paid: true
  20_adversarial_counterargument:
    chain:
    - openrouter-free
    - claude-sonnet
    default_paid: true
  22_tagging:
    chain:
    - ollama-3b
    - mistral-small-free
    - groq-free
  27_pre_execution_assessment:
    chain:
    - claude-sonnet
    - claude-haiku
    default_paid: true
    retry_profile: user_facing
  28_observation_sweep:
    chain:
    - claude-sonnet
    default_paid: true
  29_retrospective_triage:
    chain:
    - groq-free
    - mistral-large-free
    - openrouter-nemo  # cheap paid tail — prevents DLQ storm when both free providers trip (mirrors 37_infrastructure_monitor)
  30_triage_calibration:
    chain:
    - lmstudio-30b
    - mistral-large-free
    default_paid: true
    retry_profile: background
  31_outcome_classification:
    chain:
    - glm5
    - mistral-large-free
    default_paid: true
    never_pays: false
  32_delta_assessment:
    chain:
    - glm5
    - mistral-large-free
    default_paid: true
    never_pays: false
  33_skill_refiner:
    chain:
    - gemini-free
    - groq-free
    description: LLM-driven skill improvement proposals
  34_research_synthesis:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    description: Synthesize research results into concise summaries
  38_procedure_extraction:
    chain:
    - groq-free
    - mistral-large-free
    - gemini-free
    description: Extract reusable procedures from interaction outcomes
  35_content_draft:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    - openrouter-free  # 4th free provider for resilience (same failure shape as site 29)
    description: Draft content for various platforms
  23_fresh_eyes_review:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
  36_code_auditor:
    chain:
    - kimi-k2.5
    - gemini-free
    - openrouter-mimo
    description: "Surplus code review \u2014 evaluate codebase for bugs and quality\
      \ issues"
  37_infrastructure_monitor:
    chain:
    - groq-free
    - mistral-large-free
    - openrouter-nemo
    default_paid: true
    retry_profile: background
    description: "Proactive infrastructure monitoring \u2014 trend detection and forecasting"
  contingency_foreground:
    chain:
    - kimi-k2.5
    - openrouter-qwen36plus
    - gpt-5.4
    default_paid: true
    retry_profile: user_facing
    description: "CC contingency \u2014 foreground conversation via API when CC unavailable"
  contingency_micro:
    chain:
    - mistral-small-free
    - gemini-free
    - groq-free
    never_pays: true
    retry_profile: background
    description: "CC contingency \u2014 Micro reflection via free API when CC unavailable (cheap periodic ticks, quality not critical)"
  autonomous_executor_reasoning:
    chain:
    - claude-sonnet
    - openrouter-qwen36plus
    - gpt-5.4
    default_paid: true
    retry_profile: background
    description: Autonomous executor non-tooling reasoning via API
  cc_update_analysis:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    default_paid: true
    description: Analyze CC version changes for impact on Genesis
  email_triage:
    chain:
    - gemini-free
    - mistral-small-free
    - groq-free
    never_pays: true
    description: "Email triage \u2014 Gemini-primary light filter for weekly email\
      \ batch"
retry:
  default:
    max_retries: 3
    base_delay_ms: 500
    max_delay_ms: 30000
  user_facing:
    max_retries: 2
    base_delay_ms: 300
    max_delay_ms: 5000
  background:
    max_retries: 4
    base_delay_ms: 1000
    max_delay_ms: 60000
surplus:
  idle_threshold_minutes: 15
  dispatch_interval_minutes: 5
  brainstorm_check_interval_hours: 12
  task_expiry_hours: 72
  max_attempts: 2
  tier_policy:
    brainstorm_user:
    - free_api
    - local_30b
    brainstorm_self:
    - free_api
    - local_30b
    meta_brainstorm:
    - free_api
    - local_30b
    # Phase 2: new surplus task types (Tier 1 — observation only)
    model_eval:
    - free_api
    gap_clustering:
    - free_api
    anticipatory_research:
    - free_api
    prompt_effectiveness_review:
    - free_api
    # Infrastructure maintenance (no LLM needed — scripts only)
    disk_cleanup:
    - free_api
    db_maintenance:
    - free_api
    dead_letter_replay:
    - free_api
    backup_verification:
    - free_api
  health_checks:
    lmstudio:
      url: ${LM_STUDIO_HEALTH_URL:-http://localhost:1234/v1/models}
      timeout_s: 3
      cache_ttl_s: 60
