providers:
  ollama-3b:
    type: ollama
    model: qwen2.5:3b
    profile: qwen2.5-3b
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    free: true
    enabled: ${GENESIS_ENABLE_OLLAMA:-true}
    keep_alive: -1
    open_duration_s: 60
  ollama-embedding:
    type: ollama
    model: ${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:0.6b-fp16}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    free: true
    enabled: ${GENESIS_ENABLE_OLLAMA:-true}
    keep_alive: -1
    open_duration_s: 60
  mistral-large-free:
    type: mistral
    model: mistral-large-latest
    profile: mistral-large-3
    free: true
    rpm_limit: 4
    open_duration_s: 120
  mistral-small-free:
    type: mistral
    model: mistral-small-latest
    profile: mistral-small
    free: true
    rpm_limit: 30
    open_duration_s: 120
  groq-free:
    type: groq
    model: llama-3.3-70b-versatile
    profile: llama-3.3-70b
    free: true
    rpm_limit: 30
    open_duration_s: 120
  # GROUNDWORK: gpt-oss-120b — a free reasoning option for reasoning/JSON-heavy
  # chains. Defined + tested (per-provider param plumbing), not yet wired into
  # any chain; wiring is a separate routing-rebalance change.
  groq-oss-120b:
    type: groq
    model: openai/gpt-oss-120b
    profile: gpt-oss-120b
    free: true
    rpm_limit: 30
    open_duration_s: 120
    params:
      extra_body:
        include_reasoning: false
        reasoning_effort: low
  gemini-free:
    type: google
    # GA stable (was gemini-3-flash-preview; gemini-3.5-flash is Google's own
    # recommended replacement for that preview — escape preview deprecation churn).
    model: gemini-3.5-flash
    profile: gemini-3.5-flash
    free: true
    rpm_limit: 15
    open_duration_s: 120
    # gemini-3.5-flash reasons by default (~70-90 thinking tokens even on trivial
    # prompts → empty content at tight max_tokens + free-tier TPM bloat). This is
    # the fast-flash lane (fact extraction, tagging, surplus brainstorm), so
    # suppress thinking. reasoning_effort=disable → Gemini thinkingBudget=0
    # (verified live 2026-06-23: content correct, 0 reasoning tokens at mt=20).
    params:
      reasoning_effort: disable
  openrouter-free:
    type: openrouter
    model: qwen/qwen-2.5-72b-instruct
    profile: qwen-2.5-72b
    free: true
    rpm_limit: 20
    open_duration_s: 120
  openrouter-haiku:
    type: openrouter
    model: anthropic/claude-haiku-4.5
    profile: claude-haiku-4.5
    free: false
    rpm_limit: 20
    open_duration_s: 120
  openrouter-sonnet:
    type: openrouter
    model: anthropic/claude-sonnet-4.6
    profile: claude-sonnet-4.6
    free: false
    rpm_limit: 20
    open_duration_s: 120
  openrouter-opus:
    type: openrouter
    model: anthropic/claude-opus-4.6
    profile: claude-opus-4.6
    free: false
    rpm_limit: 20
    open_duration_s: 120
  # ── Phase 2 providers (gated on eval before chain promotion) ──
  nvidia-nim-deepseek:
    type: nvidia_nim
    model: deepseek-ai/deepseek-v4-pro
    profile: nvidia-nim-deepseek-v4-pro
    free: true
    rpm_limit: 20  # 40 RPM shared pool — 20 each to stay within aggregate limit
    open_duration_s: 120
  nvidia-nim-kimi:
    type: nvidia_nim
    model: moonshotai/kimi-k2.6
    profile: nvidia-nim-kimi-k2.6
    free: true
    rpm_limit: 20  # 40 RPM shared pool — 20 each to stay within aggregate limit
    open_duration_s: 120
  # cerebras DISABLED — all models removed from Cerebras as of 2026-05.
  # Only reasoning-only models remain (gpt-oss-120b, zai-glm-4.7) which
  # return 'reasoning' field instead of 'content', incompatible with LiteLLM.
  # Re-enable when Cerebras adds standard chat models or LiteLLM adds support.
  # cerebras-glm:
  #   type: cerebras
  #   model: zai-glm-4.7
  #   profile: cerebras-glm47
  #   free: true
  #   rpm_limit: 10
  #   open_duration_s: 120
  github-o3mini:
    type: github
    model: o3-mini
    profile: github-o3-mini
    free: true
    # Disabled: GitHub Models API does not currently serve o3-mini
    # (only gpt-4o, gpt-4o-mini, Llama 3.1 available as of 2026-04-14)
    enabled: false
    rpm_limit: 10
    open_duration_s: 120
  openrouter-gemma4:
    type: openrouter
    model: google/gemma-4-31b-it:free
    profile: gemma-4-31b
    free: true
    rpm_limit: 20
    open_duration_s: 120
  openrouter-qwen3coder:
    type: openrouter
    model: qwen/qwen3-coder:free
    profile: qwen3-coder
    free: true
    rpm_limit: 8  # Actual OpenRouter limit (high-demand Venice backend)
    open_duration_s: 120
  openrouter-deepseek-v4:
    type: openrouter
    model: deepseek/deepseek-v4-pro
    profile: deepseek-v4-pro
    free: false
    rpm_limit: 20
    open_duration_s: 120
  openrouter-deepseek-v4-flash:
    type: openrouter
    model: deepseek/deepseek-v4-flash
    profile: deepseek-v4-flash
    free: false
    rpm_limit: 20
    open_duration_s: 120
  openrouter-gpt55:
    type: openrouter
    model: openai/gpt-5.5
    profile: gpt-5.5
    free: false
    rpm_limit: 20
    open_duration_s: 120
  openrouter-mimo:
    type: openrouter
    model: xiaomi/mimo-v2-pro
    profile: mimo-v2-pro
    free: false
    rpm_limit: 20
    open_duration_s: 120
  deepseek-chat:
    type: deepseek
    model: deepseek-chat
    profile: deepseek-v3
    free: false
    # Deprecated: use openrouter-deepseek-v4 or v4-flash instead
    enabled: false
    open_duration_s: 120
  openai-gpt5:
    type: openai
    model: gpt-5.4
    profile: gpt-5.4
    free: false
    open_duration_s: 120
  xai-grok:
    type: xai
    model: grok-3-mini
    profile: grok-3-mini
    free: false
    open_duration_s: 120
  qwen-plus:
    type: qwen
    model: qwen3.5-plus
    profile: qwen-3.5-plus
    free: false
    open_duration_s: 120
  glm51:
    type: zenmux
    model: z-ai/glm-5.1
    profile: glm-5.1
    base_url: https://zenmux.ai/api/v1
    free: false
    open_duration_s: 120
  minimax-m25:
    type: minimax
    model: MiniMax-M2.7
    profile: minimax-m2.7
    base_url: https://api.minimaxi.com/v1
    free: false
    open_duration_s: 120
  openrouter-nemo:
    type: openrouter
    model: mistralai/mistral-nemo
    profile: mistral-nemo
    free: false
    rpm_limit: 20
    open_duration_s: 120
  gpt-5.4:
    type: openrouter
    model: openai/gpt-5.4
    profile: gpt-5.4
    free: false
    open_duration_s: 120
  kimi-k2.5:
    type: openrouter
    model: moonshotai/kimi-k2.6
    profile: kimi-k2.6
    free: false
    rpm_limit: 20
    open_duration_s: 120
  openrouter-qwen36plus:
    type: openrouter
    model: qwen/qwen3.6-plus
    profile: qwen-3.6-plus
    free: false
    rpm_limit: 20
    open_duration_s: 120
  lmstudio-30b:
    type: lmstudio
    model: mistral-small-3.2-24b-instruct-2506
    profile: mistral-small-3.2-24b
    base_url: ${LM_STUDIO_URL:-http://localhost:1234/v1}
    free: true
    enabled: ${GENESIS_ENABLE_LM_STUDIO:-false}
    open_duration_s: 120
call_sites:
  3_micro_reflection:
    chain:
    - mistral-small-free
    - openrouter-free
    - mistral-large-free
    - groq-free
    - gemini-free
    # Additional free providers so an essential reflection (3_micro_reflection
    # is in degradation._L3_KEEP) survives a broad free-tier outage without
    # paid fallback. Healthy OpenRouter-free models first; NIM last (shared
    # 40 RPM pool, currently flaky).
    - openrouter-gemma4
    - nvidia-nim-kimi
    - nvidia-nim-deepseek
    retry_profile: background
  4_light_reflection:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    default_paid: false
    never_pays: true
  5_deep_reflection:
    chain:
    - openrouter-sonnet
    default_paid: true
    retry_profile: background
    cc_model: Sonnet
    dispatch: cli
  6_strategic_reflection:
    chain:
    - openrouter-opus
    default_paid: true
    retry_profile: background
    cc_model: Opus
    dispatch: cli
  # NOTE (2026-07-13): legacy ego sites 7_ego_cycle + 8_ego_compaction were
  # REMOVED here. #26 ("Phase A — ephemeral sessions") split the ego into two
  # (recording under 7_user_ego_cycle / 7_genesis_ego_cycle, both CC-dispatched)
  # and made compaction deterministic (no LLM). Both YAML entries were orphaned —
  # the backend snapshot emitted them as phantom "healthy but never active" tiles.
  9_fact_extraction:
    chain:
    - groq-free
    - gemini-free
    - nvidia-nim-deepseek
    - mistral-large-free
    - openrouter-deepseek-v4-flash
  # V4 placeholder: cognitive state IS actively maintained today, but via direct
  # DB writes (awareness/loop.py, cc/reflection_bridge*.py), NOT this call site.
  # This entry reserves a routing chain for the future LLM-summary regeneration feature.
  10_cognitive_state:
    chain:
    - glm51
    - openrouter-sonnet
    default_paid: true
  11_user_model_synthesis:
    chain:
    - mistral-small-free
    - groq-free
    - gemini-free
    - openrouter-free
    retry_profile: background
  12_surplus_brainstorm:
    chain:
    - gemini-free
    - mistral-large-free
    - groq-free
    - openrouter-free
    - nvidia-nim-deepseek
    - nvidia-nim-kimi
    never_pays: true
  13_morning_report:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
  14_weekly_self_assessment:
    chain:
    - openrouter-opus
    default_paid: true
    dispatch: cli
    cc_model: Opus
  16_quality_calibration:
    chain:
    - openrouter-sonnet
    default_paid: true
    dispatch: cli
    cc_model: Sonnet
  17_executor_review:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4-flash
    - openrouter-deepseek-v4
    - openrouter-qwen36plus
    default_paid: true
    description: "Task executor Gate 2 — cross-vendor quality review of deliverables. Renamed from 17_fresh_eyes_review 2026-05-10 (disambiguates from outreach pre-send check at 23_outreach_review)."
  # V4 placeholder: pre-reflection prompt engineering. Never wired. Reserved for
  # future adaptive-prompting work; remove if V4 design drops the feature.
  18_meta_prompting:
    chain:
    - openrouter-free
    default_paid: true
  20_adversarial_counterargument:
    chain:
    - openrouter-gpt55
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4
    - openrouter-qwen36plus
    default_paid: true
    description: "Task executor Gate 3 — devil's advocate challenge of deliverables"
  21_session_observer:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
    retry_profile: background
  # V4 placeholder: entity extraction / metadata tagging for the knowledge graph.
  # No live consumers today; chain is prep for future memory-consolidation pipeline.
  22_tagging:
    chain:
    - mistral-small-free
    - groq-free
    - openrouter-free
  # Dream cycle: cluster-merge synthesis for episodic memory consolidation.
  # Free-tier only. Separate from 22_tagging (entity extraction).
  dream_cycle_synthesis:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4-flash
    - groq-free
    retry_profile: background
  # Adversarial challenge of synthesis output. Different provider from
  # synthesis (Kimi challenges DeepSeek) ensures model independence.
  dream_cycle_synthesis_challenge:
    chain:
    - nvidia-nim-kimi
    - groq-free
    # Paid Kimi via OpenRouter as last-resort fallback — same model family as
    # the free NIM primary, so the Kimi-challenges-DeepSeek independence holds
    # even when both free tiers are down. Only billed during a free-tier outage.
    - kimi-k2.5
    retry_profile: background
  dream_cycle_entity_check:
    chain:
    - nvidia-nim-kimi
    - groq-free
    - mistral-small-free
    - openrouter-free
    # More free, NON-DeepSeek providers so the entity check stays independent
    # from the DeepSeek entity_challenge while surviving a free-tier outage.
    - gemini-free
    - mistral-large-free
    - openrouter-gemma4
    retry_profile: background
  # Adversarial challenge of entity "duplicate" verdicts. Flipped pairing:
  # DeepSeek challenges Kimi's entity judgments.
  dream_cycle_entity_challenge:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4-flash
    retry_profile: background
  # One-shot supervised wing backfill (scripts/wing_backfill.py) — batch
  # classification of legacy general/uncategorized memories into wings.
  # Same free background family as the dream-cycle classification sites.
  wing_backfill:
    chain:
    - nvidia-nim-kimi
    - nvidia-nim-deepseek
    - groq-free
    - openrouter-deepseek-v4-flash
    retry_profile: background
  27_pre_execution_assessment:
    chain:
    - glm51
    - minimax-m25
    - openrouter-deepseek-v4-flash
    default_paid: true
    retry_profile: user_facing
    description: "Task executor — sanity-check proposed execution plans before committing resources"
  # Functionally replaced by awareness loop's signal collection
  # (awareness/loop.py:perform_tick). Kept as historical; no live consumers.
  28_observation_sweep:
    chain:
    - minimax-m25
    - openrouter-deepseek-v4-flash
    - glm51
    - groq-free
    - gemini-free
    default_paid: true
    description: "Observation pipeline — batch classification and sweep (currently disabled)"
  29_retrospective_triage:
    chain:
    - groq-free
    - mistral-large-free
    - openrouter-nemo
  30_triage_calibration:
    chain:
    - lmstudio-30b
    - mistral-large-free
    default_paid: true
    retry_profile: background
  31_outcome_classification:
    chain:
    - glm51
    - mistral-large-free
    default_paid: true
    never_pays: false
  32_delta_assessment:
    chain:
    - glm51
    - mistral-large-free
    default_paid: true
    never_pays: false
  33_skill_refiner:
    chain:
    - gemini-free
    - groq-free
    - nvidia-nim-deepseek
    - mistral-large-free
    description: LLM-driven skill improvement proposals
  34_research_synthesis:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    - nvidia-nim-deepseek
    - nvidia-nim-kimi
    description: Synthesize research results into concise summaries
  38_procedure_extraction:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4-flash
    - openrouter-deepseek-v4
    - groq-free
    - mistral-large-free
    default_paid: true
    description: Judge + store procedures from struggle detection and extraction
      pipeline candidates
  38a_procedure_novelty_llm:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4
    default_paid: true
    description: Cross-task_type procedure dedup judgment (is a new procedure
      redundant with existing ones). S-tier only — precision is the safety
      property (validated 0 false-merges on deepseek-v4); fires per novel
      procedure, low volume.
  40_ego_focus_selection:
    chain:
    - groq-free
    - mistral-small-free
    - gemini-free
    description: "Unified cognitive loop focus selector — picks ego attention direction from pending signals"
  43_task_retrospective:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4-flash
    - openrouter-deepseek-v4
    - mistral-large-free
    - gemini-free
    default_paid: true
    description: Post-execution retrospective learning extraction
  44_task_premortem:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4-flash
    - openrouter-deepseek-v4
    - mistral-large-free
    - gemini-free
    default_paid: true
    description: Pre-mortem failure analysis before committing to execution
  45_intelligence_intake:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    - openrouter-free
    never_pays: true
    retry_profile: background
    description: "Intelligence intake — score uncurated recon findings for relevance and quality"
  # Reasoning-first (2026-07-12): generating operational gotchas from structured
  # infra facts is failure-mode reasoning over data, so it mirrors the `judge`
  # chain (deepseek reasoning) rather than a general-chat model — better matched
  # AND cheaper than sonnet. Regenerates only on a section's fact-hash change, so
  # cost is negligible. Free general models (gemini/mistral) proved high-quality
  # on the live first run and serve as robust fallback.
  46_infra_annotation:
    chain:
    - openrouter-deepseek-v4
    - nvidia-nim-deepseek
    - gemini-free
    - mistral-large-free
    - openrouter-free
    default_paid: true
    retry_profile: background
    description: "Infrastructure body-schema annotations — operational gotchas per fact section"
  35_content_draft:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    - openrouter-free
    description: Draft content for various platforms
  23_outreach_review:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    description: "Outreach pre-send cross-vendor review (free chain). Renamed from 23_fresh_eyes_review 2026-05-10 (disambiguates from executor Gate 2 at 17_executor_review)."
  36_code_auditor:
    chain:
    - kimi-k2.5
    - gemini-free
    - openrouter-mimo
    description: "Surplus code review \u2014 evaluate codebase for bugs and quality\
      \ issues"
  # Temporarily disabled in commit ff2198c (2026-05-03) \u2014 output quality from free
  # models was too low for the surplus pipeline. Sentinel infrastructure
  # (src/genesis/sentinel/monitor.py) remains in place. Rework pending: needs
  # higher-tier providers and tighter prompts before re-enable.
  37_infrastructure_monitor:
    chain:
    - groq-free
    - mistral-large-free
    - openrouter-nemo
    default_paid: true
    retry_profile: background
    description: "Proactive infrastructure monitoring \u2014 trend detection and forecasting"
  40_knowledge_distillation:
    chain:
    - nvidia-nim-deepseek
    - groq-free
    - gemini-free
    - mistral-large-free
    - openrouter-free
    - openrouter-deepseek-v4-flash
    default_paid: true
    retry_profile: background
    description: "Knowledge pipeline — distill raw content into structured knowledge units"
  41_resume_review_pass1:
    chain:
    - mistral-large-free
    - gemini-free
    - groq-free
    - openrouter-free
    retry_profile: background
    description: "Resume review Pass 1 — native LLM structural analysis"
  42_resume_review_pass2:
    chain:
    - mistral-large-free
    - gemini-free
    - groq-free
    - openrouter-free
    retry_profile: background
    description: "Resume review Pass 2 — knowledge-augmented critique"
  contingency_foreground:
    chain:
    - kimi-k2.5
    - openrouter-qwen36plus
    - gpt-5.4
    default_paid: true
    retry_profile: user_facing
    description: "CC contingency \u2014 foreground conversation via API when CC unavailable"
  contingency_micro:
    chain:
    - mistral-small-free
    - gemini-free
    - groq-free
    - openrouter-free
    never_pays: true
    retry_profile: background
    description: "CC contingency \u2014 Micro reflection via free API when CC unavailable\
      \ (cheap periodic ticks, quality not critical)"
  autonomous_executor_reasoning:
    chain:
    - openrouter-sonnet
    - openrouter-qwen36plus
    - gpt-5.4
    default_paid: true
    retry_profile: background
    description: Autonomous executor non-tooling reasoning via API
  failure_exit_gate:
    chain:
    - openrouter-sonnet
    - openrouter-qwen36plus
    default_paid: true
    retry_profile: background
    description: Adversarial exit gate — challenges task failures before allowing
      surrender
  cc_update_analysis:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    default_paid: true
    description: Analyze CC version changes for impact on Genesis
  outreach_email_triage:
    chain:
    - gemini-free
    - mistral-small-free
    - groq-free
    never_pays: true
    description: "Outreach email triage \u2014 Gemini-primary light filter for weekly\
      \ email batch. Renamed from email_triage 2026-05-10 (disambiguates triage\
      \ namespace; this is the outreach-domain triage, distinct from\
      \ 29_retrospective_triage and 30_triage_calibration in the learning domain)."
  contribution_gate:
    chain:
    - openrouter-haiku
    - groq-free
    - gemini-free
    default_paid: true
    description: "Contribution pipeline \u2014 evaluates whether a code change is\
      \ already fixed upstream"
  crag_grade:
    chain:
    - openrouter-haiku
    - mistral-small-free
    - groq-free
    - gemini-free
    default_paid: true
    retry_profile: user_facing
    dispatch: api
    description: "CRAG retrieval grader — scores topical relevance of a recalled\
      \ memory to the query for selective corrective retrieval\
      \ (memory_recall/knowledge_recall). Fast cross-vendor chain; the corrective\
      \ pass fail-fasts (bounded grade step — returns original results if the\
      \ grader is slow/down) and sheds under REDUCED degradation."
  judge:
    chain:
    - nvidia-nim-deepseek
    - openrouter-deepseek-v4
    - openrouter-deepseek-v4-flash
    default_paid: true
    retry_profile: background
    dispatch: api
    description: "LLM-as-judge primitive \u2014 grades outputs against versioned\
      \ rubrics for the eval harness (and, in later phases, CRAG retrieval).\
      \ Free NIM v4-pro first, then paid v4-pro, then v4-flash for resilience; model_used\
      \ is logged per judgment for calibration traceability."
  voice_conversation:
    chain:
    - groq-free
    - gemini-free
    - mistral-large-free
    default_paid: false
    retry_profile: user_facing
    dispatch: api
    description: "Voice channel conversation \u2014 low-latency free-tier chain\
      \ for HA voice assistant. Groq first for speed (~1s), Gemini/Mistral\
      \ as fallbacks."
  attention_salience:
    chain:
    - mistral-small-free
    - nvidia-nim-deepseek
    never_pays: true
    retry_profile: user_facing
    description: >-
      Attention engine L1.5 salience gate (offline shadow tool, opt-in via the runner's
      --l15 flag): scores a graduated ~8s ambient window into {real, perk} floats. PRIVACY
      \u2014 this sends the window's household transcript text to an external free LLM; only the
      float verdict is persisted (never the text). Provider bake-off 2026-07-01 over real
      garbled windows: mistral-small-latest (100% clean JSON, ~0.8s) primary + nvidia-nim
      deepseek-v4-pro (100% clean, different vendor) fallback; both free, so never_pays
      keeps a valid chain. NON-Groq deliberately \u2014 Groq's 8B is EOL 2026-08-16 and its
      gpt-oss-20b replacement breaks strict JSON.
  ambient_arbiter:
    chain: []
    dispatch: cli
    cc_model: Haiku
    never_pays: true
    description: >-
      Ambient session-awareness arbiter: judges which drift-fire candidate
      memories deserve surfacing (headless CC, model PINNED in
      session_awareness/arbiter.py). The chain is empty BY DESIGN: no API
      fallback exists (a failed call records an empty verdict, never a guess)
      and the router never dispatches this site. The detached ambient worker
      spawns CC directly and reports each run via record_last_run; registered
      here for neural-monitor visibility and central declaration.
  ambient_ledger_extractor:
    chain: []
    dispatch: cli
    cc_model: Haiku
    never_pays: true
    description: >-
      Ambient session-ledger shadow extractor (session-manager PR-3):
      extracts missed agreements/pivots from the transcript delta at each
      PreCompact boundary (headless CC, model PINNED in
      session_awareness/ledger_extractor.py). SHADOW-ONLY: proposals land in
      session_ledger_shadow_*, never the live ledger. Empty chain BY DESIGN
      (no API fallback; a failed run is recorded, never retried elsewhere);
      the detached worker spawns CC directly and reports via
      record_last_run_detached. Registered for neural-monitor visibility.
retry:
  # max_total_s: aggregate wall-clock ceiling (seconds) across a single
  # route_call's retries x chain length. A safety net against pathological
  # multi-minute hangs, checked only BETWEEN attempts (never interrupts an
  # in-flight call). It bounds ONE completion's retry-multiplier, NOT Genesis's
  # cognition (a reflection is many bounded completions). Omit for no cap.
  default:
    max_retries: 3
    base_delay_ms: 500
    max_delay_ms: 30000
    max_total_s: 300
  user_facing:
    max_retries: 2
    base_delay_ms: 300
    max_delay_ms: 5000
    max_total_s: 180
  background:
    max_retries: 4
    base_delay_ms: 1000
    max_delay_ms: 60000
    # Generous safety net only — should never fire in normal operation. Dream /
    # reflection / ego are exactly where a single completion may legitimately
    # take a while across failovers; we only stop the pathology, not cognition.
    max_total_s: 1800
