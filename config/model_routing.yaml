    profile: gemini-3-flash
    free: true
    rpm_limit: 15
    open_duration_s: 120
  openrouter-free:
    type: openrouter
    model: qwen/qwen-2.5-72b-instruct
    profile: qwen-2.5-72b
    free: true
    rpm_limit: 20
    open_duration_s: 120
  openrouter-haiku:
    type: openrouter
    model: anthropic/claude-haiku-4.5
    profile: claude-haiku-4.5
    free: false
    rpm_limit: 20
    open_duration_s: 120
