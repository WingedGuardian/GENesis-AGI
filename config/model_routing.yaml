call_sites:
  3_micro_reflection:
    chain:
    - mistral-small-free
    - openrouter-free
    - mistral-large-free
    - groq-free
    - gemini-free
    retry_profile: background
  4_light_reflection:
    chain:
    - groq-free
    - mistral-large-free
    - gemini-free
    default_paid: false
    never_pays: true
  5_deep_reflection:
    chain:
    - claude-sonnet
    default_paid: true
    retry_profile: background
    cc_model: Sonnet
    dispatch: cli
  6_strategic_reflection:
    chain:
    - claude-opus
    default_paid: true
    retry_profile: background
    cc_model: Opus
    dispatch: cli
  7_ego_cycle:
    chain:
    - claude-opus
    default_paid: true
    retry_profile: background
    dispatch: cli
    cc_model: Opus
  8_ego_compaction:
    chain:
    - claude-haiku
    - mistral-large-free
    default_paid: true
  9_fact_extraction:
    chain:
    - groq-free
    - gemini-free
    - cerebras-qwen
    - mistral-large-free
    - openrouter-deepseek-v4-flash
  # V4 placeholder: cognitive state IS actively maintained today, but via direct
  # DB writes (awareness/loop.py, cc/reflection_bridge*.py), NOT this call site.
  # This entry reserves a routing chain for the future LLM-summary regeneration feature.
  10_cognitive_state:
    chain:
    - glm51
    - claude-sonnet
    default_paid: true
  11_user_model_synthesis:
    chain:
    - mistral-small-free
    - groq-free
    - gemini-free
    - openrouter-free
    retry_profile: background
  12_surplus_brainstorm:
    chain:
    - cerebras-qwen
    - gemini-free
    - mistral-large-free
    - groq-free
    - openrouter-free
    never_pays: true
  13_morning_report:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
  14_weekly_self_assessment:
    chain:
    - claude-opus
    default_paid: true
    dispatch: cli
    cc_model: Opus
  16_quality_calibration:
    chain:
    - claude-sonnet
    default_paid: true
    dispatch: cli
    cc_model: Sonnet
  17_fresh_eyes_review:
    chain:
    - openrouter-deepseek-v4
    - openrouter-qwen36plus
    default_paid: true
    description: "Task executor Gate 2 — cross-vendor quality review of deliverables"
  # V4 placeholder: pre-reflection prompt engineering. Never wired. Reserved for
  # future adaptive-prompting work; remove if V4 design drops the feature.
  18_meta_prompting:
    chain:
    - openrouter-free
    default_paid: true
  20_adversarial_counterargument:
    chain:
    - openrouter-gpt55
    - openrouter-deepseek-v4
    - openrouter-qwen36plus
    default_paid: true
    description: "Task executor Gate 3 — devil's advocate challenge of deliverables"
  21_session_observer:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    - openrouter-free
    retry_profile: background
  # V4 placeholder: entity extraction / metadata tagging for the knowledge graph.
  # No live consumers today; chain is prep for future memory-consolidation pipeline.
  22_tagging:
    chain:
    - mistral-small-free
    - groq-free
    - openrouter-free
  27_pre_execution_assessment:
    chain:
    - glm51
    - minimax-m25
    - openrouter-deepseek-v4-flash
    default_paid: true
    retry_profile: user_facing
    description: "Task executor — sanity-check proposed execution plans before committing resources"
  # Functionally replaced by awareness loop's signal collection
  # (awareness/loop.py:perform_tick). Kept as historical; no live consumers.
  28_observation_sweep:
    chain:
    - minimax-m25
    - openrouter-deepseek-v4-flash
    - glm51
    - groq-free
    - gemini-free
    default_paid: true
    description: "Observation pipeline — batch classification and sweep (currently disabled)"
  29_retrospective_triage:
    chain:
    - groq-free
    - mistral-large-free
    - openrouter-nemo
  30_triage_calibration:
    chain:
    - lmstudio-30b
    - mistral-large-free
    default_paid: true
    retry_profile: background
  31_outcome_classification:
    chain:
    - glm51
    - mistral-large-free
    default_paid: true
    never_pays: false
  32_delta_assessment:
    chain:
    - glm51
    - mistral-large-free
    default_paid: true
    never_pays: false
  33_skill_refiner:
    chain:
    - gemini-free
    - groq-free
    description: LLM-driven skill improvement proposals
  34_research_synthesis:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    description: Synthesize research results into concise summaries
  38_procedure_extraction:
    chain:
    - groq-free
    - mistral-large-free
    - gemini-free
    description: Extract reusable procedures from interaction outcomes
  43_task_retrospective:
    chain:
    - openrouter-deepseek-v4
    - mistral-large-free
    - gemini-free
    default_paid: true
    description: Post-execution retrospective learning extraction
  35_content_draft:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
    - openrouter-free
    description: Draft content for various platforms
  23_fresh_eyes_review:
    chain:
    - gemini-free
    - groq-free
    - mistral-large-free
  36_code_auditor:
    chain:
    - kimi-k2.5
    - gemini-free
    - openrouter-mimo
    description: "Surplus code review \u2014 evaluate codebase for bugs and quality\
      \ issues"
  # Temporarily disabled in commit ff2198c (2026-05-03) \u2014 output quality from free
  # models was too low for the surplus pipeline. Sentinel infrastructure
  # (src/genesis/sentinel/monitor.py) remains in place. Rework pending: needs
  # higher-tier providers and tighter prompts before re-enable.
  37_infrastructure_monitor:
    chain:
    - groq-free
    - mistral-large-free
    - openrouter-nemo
    default_paid: true
    retry_profile: background
    description: "Proactive infrastructure monitoring \u2014 trend detection and forecasting"
  40_knowledge_distillation:
    chain:
    - cerebras-qwen
    - groq-free
    - gemini-free
    - mistral-large-free
    - openrouter-free
    - openrouter-deepseek-v4-flash
    default_paid: true
    retry_profile: background
    description: "Knowledge pipeline — distill raw content into structured knowledge units"
  41_resume_review_pass1:
    chain:
    - mistral-large-free
    - gemini-free
    - groq-free
    - cerebras-qwen
    - openrouter-free
    retry_profile: background
    description: "Resume review Pass 1 — native LLM structural analysis"
  42_resume_review_pass2:
    chain:
    - cerebras-qwen
    - mistral-large-free
    - gemini-free
    - groq-free
    - openrouter-free
    retry_profile: background
    description: "Resume review Pass 2 — knowledge-augmented critique"
  contingency_foreground:
    chain:
    - kimi-k2.5
    - openrouter-qwen36plus
    - gpt-5.4
    default_paid: true
    retry_profile: user_facing
    description: "CC contingency \u2014 foreground conversation via API when CC unavailable"
  contingency_micro:
    chain:
    - mistral-small-free
    - gemini-free
    - groq-free
    - openrouter-free
    never_pays: true
    retry_profile: background
    description: "CC contingency \u2014 Micro reflection via free API when CC unavailable\
      \ (cheap periodic ticks, quality not critical)"
  autonomous_executor_reasoning:
    chain:
    - claude-sonnet
    - openrouter-qwen36plus
    - gpt-5.4
    default_paid: true
    retry_profile: background
    description: Autonomous executor non-tooling reasoning via API
  failure_exit_gate:
    chain:
    - claude-sonnet
    - openrouter-qwen36plus
    default_paid: true
    retry_profile: background
    description: Adversarial exit gate — challenges task failures before allowing
      surrender
  cc_update_analysis:
    chain:
    - mistral-large-free
    - groq-free
    - gemini-free
    default_paid: true
    description: Analyze CC version changes for impact on Genesis
  email_triage:
    chain:
    - gemini-free
    - mistral-small-free
    - groq-free
    never_pays: true
    description: "Email triage \u2014 Gemini-primary light filter for weekly email\
      \ batch"
  contribution_gate:
    chain:
    - claude-haiku
    - groq-free
    - gemini-free
    default_paid: true
    description: "Contribution pipeline \u2014 evaluates whether a code change is\
      \ already fixed upstream"
  judge:
    chain:
    - openrouter-deepseek-v4
    default_paid: true
    retry_profile: background
    dispatch: api
    description: "LLM-as-judge primitive \u2014 grades outputs against versioned\
      \ rubrics for the eval harness (and, in later phases, CRAG retrieval).\
      \ Single-model chain by design: if the judge model is unavailable,\
      \ fail loudly rather than silently swap models and corrupt calibration."
retry:
  default:
    max_retries: 3
    base_delay_ms: 500
    max_delay_ms: 30000
  user_facing:
    max_retries: 2
    base_delay_ms: 300
    max_delay_ms: 5000
  background:
    max_retries: 4
    base_delay_ms: 1000
    max_delay_ms: 60000
surplus:
  idle_threshold_minutes: 15
  dispatch_interval_minutes: 5
  brainstorm_check_interval_hours: 12
  task_expiry_hours: 72
  max_attempts: 2
  tier_policy:
    brainstorm_user:
    - free_api
    - local_30b
    brainstorm_self:
    - free_api
    - local_30b
    meta_brainstorm:
    - free_api
    - local_30b
    # Phase 2: new surplus task types (Tier 1 — observation only)
    model_eval:
    - free_api
    gap_clustering:
    - free_api
    anticipatory_research:
    - free_api
    prompt_effectiveness_review:
    - free_api
    # Infrastructure maintenance (no LLM needed — scripts only)
    disk_cleanup:
    - free_api
    db_maintenance:
    - free_api
    dead_letter_replay:
    - free_api
    backup_verification:
    - free_api
  health_checks:
    lmstudio:
      url: ${LM_STUDIO_HEALTH_URL:-http://localhost:1234/v1/models}
      timeout_s: 3
      cache_ttl_s: 60
