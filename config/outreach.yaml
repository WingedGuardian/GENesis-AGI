# Phase 8: Outreach pipeline configuration

quiet_hours:
  start: "22:00"
  end: "07:00"
  # timezone omitted — inherits from central genesis.yaml / USER_TIMEZONE

channel_preferences:
  default: telegram
  blocker: telegram
  alert: telegram
  surplus: telegram
  digest: telegram
  # Autonomous CLI approval prompts route to Telegram so the user can tap
  # the inline ✅ button (or reply with "approve" in the Approvals topic).
  approval: telegram
  # Content drafts for user review — routed to Content Review topic.
  content: telegram
  # Ego notifications — informational, no approval needed. Routed to default topic.
  notification: telegram

thresholds:
  blocker: 0.0
  alert: 0.3
  surplus: 0.7
  digest: 0.0
  # Approvals bypass the salience gate entirely — if the approval gate
  # asked for confirmation, the user always needs to see it.
  approval: 0.0
  # Content review always delivers — manual review is the quality gate.
  content: 0.0
  # Ego notifications always deliver — the ego already judged relevance.
  notification: 0.0

rate_limits:
  max_daily: 5
  surplus_daily: 1
  content_daily: 3
  notification_daily: 10

morning_report:
  trigger_time: "07:00"
  # timezone omitted — inherits from central genesis.yaml / USER_TIMEZONE

engagement:
  timeout_hours: 24
  poll_interval_minutes: 60

# Delivery routing: where each category delivers.
# Values: "supergroup" (to forum topic), "dm" (direct message), "both".
# When forum_chat_id is not configured, "supergroup" degrades to DM.
delivery_routing:
  default: supergroup
  # Approvals deliver exclusively to the supergroup Approvals topic —
  # never DM.  Grouping them in one topic keeps the inline-button UX
  # coherent and makes the "approve all N pending" button meaningful.
  approval: supergroup
  # Content review goes to dedicated topic — never DM.
  content: supergroup

health_alerts:
  # Only these alert IDs go to Telegram (CRITICAL severity only).
  # Everything else is internal (dashboard + morning report + awareness).
  # NOTE: service:bridge_down is intentionally absent — if the bridge is dead,
  # the Telegram adapter is also dead, so the alert can never be delivered.
  immediate_escalation:
    - "infra:disk_low"
    - "infra:container_memory_high"
    - "cc:quota_exhausted"
    - "provider:embedding_failing"
    - "provider:qdrant_unreachable"
    - "awareness:tick_overdue"

# Voice proactive chiming — the spoken-aloud allowlist (THE menu).
# A request is spoken through the Voice PE only if its signal_type or a
# source_id part matches one of these by prefix (OutreachPipeline._should_voice).
# Everything still goes to Telegram regardless — this only controls what
# interrupts the user out loud during `hours`. This block is authoritative;
# editing it changes behavior on next server restart. Keep entries specific
# (prefix match) and keep `task_notification` in sync with the signal_type
# set in src/genesis/autonomy/executor/engine.py _notify.
voice:
  alert_ids:
    # Memory-system + resource emergencies (matched via source_id)
    - "infra:disk_low"
    - "infra:container_memory_high"
    - "provider:embedding_failing"
    - "provider:qdrant_unreachable"
    - "awareness:tick_overdue"
    # Autonomous system needs your decision (matched via signal_type)
    - "sentinel_escalation"
    - "sentinel_approval"
    - "sentinel_action_approval"
    # Autonomous task hit a blocker/alert
    - "task_notification"
  hours: [9, 2]   # 9am-2am local (wraps midnight); end hour exclusive
