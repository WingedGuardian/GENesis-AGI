# Memory recall wiring — graph expansion + entity lane (shadow-first).
#
# Read LIVE per recall by genesis.memory.graph_expansion (no restart needed
# for a mode change in a running process). User overrides land in
# ~/.genesis/config/memory_recall.local.yaml via the dashboard/MCP settings
# writer — edit that overlay, not this file.
#
# Benchmark provenance: 1-hop expansion at max_neighbors=10 measured +12.6pp
# overall on LongMemEval (temporal +23pp, multi-session +17pp), 2026-07-14
# graph-DB decision memo.

enabled: true

graph_expansion:
  # off | shadow | live — shadow computes + emits eval_events metrics but
  # never changes recall output; live appends linked neighbors after the
  # organic results. Kill switch: mode off (or master enabled: false).
  mode: shadow
  # Neighbor cap for the full/compact MCP recall surfaces (eval parity: k=10).
  max_neighbors: 10
  # Proactive injection is token-budgeted — keep this tiny.
  proactive_max_neighbors: 2
  # Edge types never followed into LLM-visible context.
  exclude_link_types:
    - contradicts

# Entity lane in hybrid recall (PR-2) — inert until that lands; ships off.
# ("off" quoted: unquoted it parses as YAML-1.1 boolean False.)
entity_lane:
  mode: "off"

# Voyage cross-encoder reranking on the MCP recall tools (memory_recall,
# knowledge_recall, reference_lookup). off | live — DEFAULT live: these tools
# default rerank=True and their retriever now carries the Voyage reranker.
# Kill switch for a Voyage cost / latency / outage concern: set mode "off"
# (read live, no restart) or export GENESIS_MEMORY_RERANK_OFF=1. Reranking
# still no-ops automatically when API_KEY_VOYAGE is unset. This gates ONLY the
# MCP tool path — not the internal runtime context stack (long-standing) nor
# the LongMemEval harness (hermetic). ("off" quoted per the YAML-1.1 note.)
reranker:
  mode: live

# Proactive recall endpoint (/api/genesis/hook/recall) — the UserPromptSubmit
# hook is a thin client over this. Read live by genesis.memory.proactive.
#
# Intent-aware result budget: the fixed top-3 is replaced by a stance→count
# curve, so a bare command deserves ~1 memory and a decision question deserves
# 5-8. Per-profile so a future voice/s2s channel can share the engine with a
# lower curve + a plain-English renderer. Code defaults (genesis.memory.
# proactive._DEFAULT_BUDGETS) match these, so a trimmed install with no yaml
# still works.
proactive:
  # Master on/off for the endpoint's engine (the hook falls back to FTS5-only
  # when off or unreachable). enabled: false = kill switch.
  enabled: true
  profiles:
    cc_hook:
      # on | off — Voyage rerank on the per-prompt hook path (user decision
      # 2026-07-19). Flip to off (read live, no restart) for a latency/cost
      # concern; also no-ops automatically without API_KEY_VOYAGE.
      rerank: on
      budgets:
        command: 1
        chatter: 1
        general: 3
        question_decision: 6
        max: 8
