# Confidence gating thresholds — tunable at runtime via settings_update
#
# Current LLM output distribution: 0.70-0.95, clusters at 0.70/0.80/0.85/0.90/0.95
# After prompt calibration, expect lower values to appear.
# Start permissive (shadow mode), raise thresholds after observing real distribution.
#
# shadow_mode: true = log what would be filtered but don't enforce

observation_write:
  min_confidence: 0.3
  shadow_mode: true

memory_upsertion:
  min_confidence: 0.2
  shadow_mode: true

deep_reflection:
  min_confidence: 0.3
  min_separability: 0.2
  shadow_mode: true
