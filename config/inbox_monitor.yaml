inbox_monitor:
  enabled: true
  watch_path: "~/inbox"
  # response_dir is a scanner exclusion pattern — any subdirectory matching
  # this name is skipped during scanning. It is NOT the write target for
  # responses. Responses are written as sibling .genesis.md files next to
  # the source (e.g. Untitled.md → Untitled.genesis.md).
  response_dir: "_genesis"
  check_interval_seconds: 1800
  # items_per_eval: how many items (URLs / prose blocks) go into ONE Claude
  # evaluation. A file's NEW content is segmented into items and grouped into
  # batches of this size, so a 16-URL drop becomes ~4 evals (each its own
  # Genesis-N.genesis.md), not one mega-evaluation. Default 5.
  items_per_eval: 5
  # batch_size is LEGACY (files-per-cycle) and no longer governs eval grouping;
  # items_per_eval replaces it. Kept for backward compatibility.
  batch_size: 1
  model: "sonnet"
  effort: "medium"
  timeout_s: 900
  # max_retries: 3        # Max retry attempts before permanently excluding a failed item
  # recursive: false      # Set true to scan subdirectories recursively
  # timezone uses system setting from ~/.genesis/config/genesis.yaml
