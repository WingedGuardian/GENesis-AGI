# Ego session configuration
# The ego is Genesis's autonomous decision-making cycle.
# All settings are tunable via settings_update("ego", {...})

enabled: true

# Scheduling — User Ego (CEO)
cadence_minutes: 90          # base interval between cycles
activity_threshold_minutes: 30  # min time since last user message
max_interval_minutes: 240    # backoff cap (4 hours)
backoff_multiplier: 2.5      # interval multiplier on idle cycles

# Scheduling — Genesis Ego (COO)
genesis_cadence_minutes: 90          # base interval for infrastructure monitoring
genesis_max_interval_minutes: 240    # backoff cap for genesis ego

# Model
model: opus                  # default model for ego cycles

# Effort
default_effort: high         # effort for regular cycles (low/medium/high/xhigh/max)
morning_report_effort: low   # effort for morning reports

# Proposals
board_size: 3                # max active proposals on the bulletin board
max_pending_proposals: 15    # auto-table oldest unranked when exceeded
batch_digest: true           # send proposals as batch (vs individual)

# Morning report
morning_report_hour: 8       # 24h format, local time
morning_report_minute: 0
# timezone uses system setting from ~/.genesis/config/genesis.yaml
shadow_morning_report: true  # shadow mode: separate topic for 2 weeks

# Dispatch model per action_type (default: sonnet; interact always opus)
# Investigations need deeper reasoning to verify external APIs, query
# event tables, and question suspicious signals — Sonnet takes shortcuts.
dispatch_model_overrides:
  investigate: opus

# Circuit breaker
consecutive_failure_limit: 3
failure_backoff_minutes: 60  # pause after N consecutive failures

# Self-improvement: inject the ego's own confidence calibration into its context
# so it can self-correct (informational only, never a mechanical rescale).
# Live — takes effect next cycle. Set false to turn off instantly.
calibration_injection_enabled: true

# LC3-B go-live gate (default OFF): fold Outcome Bus tier-1 execution ground
# truth (source='surplus') into the capability map as a 6th source. While false,
# the capability map is unchanged (original 5 sources). capability_map is
# display-only, so enabling this only adjusts the self-performance numbers the
# ego sees in its context — no control-flow gate keys off it. Live — takes
# effect at the next capability-map refresh (9:15/21:15), no restart needed.
# NOTE: settings_update marks the whole ego domain "restart required"; that is
# not true for THIS field — the refresh job re-reads the config each run.
outcome_bus_capability_feed: false
