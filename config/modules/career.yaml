# Career Agent — career-ops + jerbs integration module.
#
# Phase 1: config-only registration (no live IPC endpoint).
# Phase 2 (2026-04-23): SshIPCAdapter enables module_call execution.
#
# Architecture: Genesis wields this module via asymmetric trust.
# Career-ops is signal-only; Genesis has override authority.
# See docs/architecture/genesis-module-paradigm.md.

name: Career Agent
type: external
description: >
  Career opportunity discovery and job application workflow. Bridges Genesis
  with career-ops (coaching, CV, deep eval) and jerbs (broad discovery,
  scoring, CRM). Career-ops is on a remote machine (SSH access); jerbs
  exposes a FastAPI HTTP server on the same host.

ipc:
  # Phase 2 will introduce method: ssh. For now, placeholder HTTP config
  # that won't connect (module starts disabled).
  method: http
  url: "http://192.168.50.8:8000"
  timeout: 30

health_check:
  endpoint: "/health"
  interval_seconds: 120
  timeout_seconds: 10
  expected_status: 200

lifecycle:
  ssh_host: "zorror@192.168.50.8"
  ssh_key: "~/.ssh/genesis_career"
  source_dir: "/home/zorror/career-ops"
  restart_cmd: "systemctl --user restart career-ops"
  logs_cmd: "journalctl --user -u career-ops --no-pager -n 50"

# Subscribe to career research profile for signal routing
research_profile: career-ops

enabled: false

# Operations manifest — what career-ops can do.
# Each maps to a command (Phase 2: SSH execution) or API endpoint (jerbs HTTP).
operations:
  run_sweep:
    method: POST
    path: /api/sweep
    description: >
      Execute sweep_fetch.py against a research spec YAML. Discovers JDs via
      ATS APIs (Greenhouse, Ashby, Lever) and web search (Brave), fetches
      content, deduplicates, extracts structured data via LLM ladder.
  eval_jd:
    method: POST
    path: /api/eval
    description: >
      Deep-evaluate a single JD against user profile. Returns fit score,
      gap analysis, and recommended talking points.
  sync_profile:
    method: POST
    path: /api/profile/sync
    description: >
      Push Genesis knowledge updates to career-ops profile.yml and
      modes/_profile.md. One-way: Genesis -> career-ops.
  get_pipeline:
    method: GET
    path: /api/pipeline
    description: >
      Read current pipeline.md status — active applications, stages,
      follow-up dates.
  get_applications:
    method: GET
    path: /api/applications
    description: >
      Read applications.md tracker — all submitted applications with
      status, scores, and report links.

# Inbound signals — events career-ops can push to Genesis.
# Not IPC operations; these are event types the module bridge recognizes.
# Phase 2 will wire these to Genesis observation_write.
configurable:
  inbound_signals:
    - profile_updated        # User edited profile.yml or _profile.md
    - jd_evaluated           # New JD evaluation completed
    - application_submitted  # User submitted an application
    - company_discovered     # New target company identified
  # Coordination rules
  career_ops_owns: "coaching, CV, deep eval, curated scans, follow-ups"
  jerbs_owns: "broad discovery, scoring, CRM, automation"
  handoff: "jerbs scores -> pipeline.md -> career-ops deep eval"
  remote_host: "192.168.50.8"
  remote_user: "zorror"
  venv_path: "/home/zorror/career-ops/.venv"
  sweep_script: "/home/zorror/career-ops/scripts/sweep_fetch.py"
