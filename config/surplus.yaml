# Surplus compute scheduler configuration.
#
# These values are the defaults. Override in config/surplus.local.yaml
# (not tracked in git) via the settings MCP tool or dashboard.

dispatch:
  interval_minutes: 5         # How often the dispatch loop runs
  task_expiry_hours: 72       # Pending tasks older than this are drained
  max_iterations_per_cycle: 3 # Max tasks dispatched per cycle

jobs:
  brainstorm_check_hours: 12
  code_audit_hours: 12
  code_index_hours: 4
  recon_gather_hours: 84       # ~3.5 days
  maintenance_hours: 24
  analytical_hours: 12
  follow_up_dispatch_minutes: 5
  memory_extraction_hours: 2
  j9_eval_batch_hours: 0          # Disabled: 100% error rate, no value

task_defaults:
  code_audit:                { priority: 0.5, drive: competence,   tier: free_api }
  code_index:                { priority: 0.3, drive: competence,   tier: local_30b }
  infrastructure_monitor:    { priority: 0.6, drive: preservation, tier: free_api }
  disk_cleanup:              { priority: 0.4, drive: preservation, tier: free_api }
  backup_verification:       { priority: 0.7, drive: preservation, tier: free_api }
  dead_letter_replay:        { priority: 0.5, drive: cooperation,  tier: free_api }
  db_maintenance:            { priority: 0.3, drive: competence,   tier: free_api }
  gap_clustering:            { priority: 0.4, drive: competence,   tier: free_api }
  anticipatory_research:     { priority: 0.3, drive: curiosity,    tier: free_api }
  prompt_effectiveness:      { priority: 0.3, drive: competence,   tier: free_api }
  j9_eval_batch:             { priority: 0.3, drive: competence,   tier: free_api }
